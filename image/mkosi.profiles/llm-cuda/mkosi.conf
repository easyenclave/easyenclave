# Profile overlay: applied only when `mkosi --profile=llm-cuda`.
# Sibling files under mkosi.profiles/llm-cuda/{mkosi.extra,
# mkosi.skeleton,mkosi.pkgmngr}/ are auto-merged by mkosi.
#
# Layered on top of image/mkosi.conf:
#  - Adds the Ubuntu snapshot mirror + NVIDIA CUDA apt repo via
#    mkosi.pkgmngr/ (build-time) and mkosi.skeleton/ (rootfs-time).
#  - Pulls in the version-pinned NVIDIA driver + CUDA 12.8 +
#    DKMS + Python so the rootfs has the inference stack baked in.
#  - Installs vLLM + nv-attestation-sdk into venvs via
#    mkosi.postinst.chroot (step 3b — see that file for details).

[Build]
# Override the base mkosi.conf's WithNetwork=false. Step 3b's
# mkosi.postinst pip-installs vLLM into /opt/venv-vllm and
# nv-attestation-sdk into /opt/venv-attestation; both require
# network access at build time. Other targets keep the offline
# default.
WithNetwork=yes

[Distribution]
# Snapshot Ubuntu mirror for byte-reproducible builds. Date matches
# confer-image. The deb files for any given (package, version) tuple
# are byte-identical across builds → squashfs hash → verity roothash
# → RTMR all stay stable across machines and over time.
Mirror=https://snapshot.ubuntu.com/ubuntu/20260209T000000Z
# Without `universe`, faketime + several CUDA-adjacent packages are
# "no installation candidate". mkosi's default for Ubuntu is `main`
# only.
Repositories=universe

[Content]
# A kernel package in Packages= flips mkosi's Bootable=auto to "yes"
# and it tries to build its own UKI + kernel-modules initrd, calling
# `modinfo --set-version` against the build sandbox's busybox modinfo
# (which doesn't grok --set-version). We don't use mkosi's UKI/initrd
# anyway — image/Makefile drives ukify directly with our own
# mkinitrd.sh output. Force Bootable=no so mkosi just lays down the
# kernel + modules in the rootfs and steps aside.
Bootable=no
# Override the base mkosi.conf's WithRecommends=false. The base image
# is intentionally minimal (just busybox + ca-certificates) and Recom-
# mends would bloat it for no reason. The llm-cuda target is the
# opposite — confer-image proves that NVIDIA driver + CUDA + DKMS
# only resolve cleanly when apt is allowed to follow the Recommends
# chain (the libnvidia-gl-580 dep graph in particular cascades
# through X11/wayland packages that aren't strictly required at
# runtime but are needed for the resolver to converge).
WithRecommends=true
# mkosi.pkgmngr/ ships the apt config mkosi sees at build time
# (Ubuntu snapshot + NVIDIA CUDA repo + signing keys). Without it,
# mkosi can't fetch the cuda-* packages below — they're not in
# Ubuntu's main archive.
PackageManagerTrees=mkosi.pkgmngr
Packages=
    # System base. The easyenclave base image (busybox-static +
    # ca-certificates) is too minimal for the NVIDIA driver chain
    # to resolve — most of these are confer-image's verbatim list
    # for the same reason. Order matches confer-image/mkosi.conf
    # so the diff against that reference is one-to-one.
    systemd
    systemd-boot-efi
    udev
    dbus
    ubuntu-keyring
    cryptsetup
    python3
    python3-pip
    python3-venv
    python3-dev
    curl
    wget
    gnupg
    unzip
    less
    net-tools
    iproute2
    iputils-ping
    kmod
    build-essential
    dkms
    zstd
    pciutils
    libxml2
    libxslt1.1
    libglib2.0-0
    libgl1
    # Packaged kernel + headers — TARGET_USE_PACKAGED_KERNEL=yes
    # makes the Makefile read the kernel from the rootfs instead of
    # the host (see image/targets/llm-cuda/profile.env). DKMS uses
    # the headers to build nvidia-driver kernel modules during
    # mkosi.postinst.chroot against the same kernel that ends up
    # in the UKI.
    linux-generic-hwe-24.04
    linux-headers-generic-hwe-24.04
    # NVIDIA — compute-only subset of the 580-series driver. The
    # full nvidia-driver-580-open meta-package pulls in libnvidia-gl
    # → X11/Wayland EGL ICDs that we don't need (this is a headless
    # CUDA inference image, no display). Splitting it out also
    # avoids apt's resolver giving up on the libnvidia-egl-gbm1
    # version skew between Ubuntu multiverse (1.1.1-1) and NVIDIA's
    # repo (1.1.2.1-0ubuntu1). -open is the MIT/GPL kernel module
    # variant required for H100 confidential-compute mode.
    # Version pins dropped — let apt pick any consistent set from
    # NVIDIA's repo. The version-pinned approach (=580.126.20-...)
    # consistently triggers apt's "two conflicting assignments"
    # giveup even after Recommends, suite-pocket coverage, the
    # 3.0 solver, and trimming to compute-only. apt 2.8 + the new
    # NVIDIA repo seem to have a known sharp edge here. We can
    # tighten the pins again once we know which exact version the
    # graph converges on.
    nvidia-dkms-580-open
    nvidia-utils-580
    libnvidia-compute-580
    nvidia-persistenced
    # nvidia-fabricmanager + libnvidia-nscq are NVL/NVSwitch-only;
    # bake them in so a multi-GPU H100 host has them ready, but
    # the daemons stay disabled on single-GPU hosts (the ee-gpu-
    # evidence helper handles the no-fabric case in step 3b).
    nvidia-fabricmanager
    libnvidia-nscq
    # CUDA 12.8 runtime + compiler. cuda-nvcc / cuda-nvvm /
    # cuda-crt are the pieces vLLM's CUDA-graph compilation step
    # needs at runtime; the rest are PyTorch wheel dependencies.
    cuda-nvcc-12-8
    cuda-nvvm-12-8
    cuda-crt-12-8
    cuda-cudart-12-8
    cuda-cudart-dev-12-8
    cuda-cccl-12-8
    cuda-driver-dev-12-8
    cuda-nvrtc-dev-12-8
    libcurand-dev-12-8
    libcublas-dev-12-8
    # faketime: used by step 3b's mkosi.postinst.chroot to clamp
    # pip-install timestamps.
    faketime
