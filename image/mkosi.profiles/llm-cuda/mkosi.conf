# Profile overlay: applied only when `mkosi --profile=llm-cuda`.
# Sibling files under mkosi.profiles/llm-cuda/{mkosi.extra,
# mkosi.skeleton,mkosi.pkgmngr}/ are auto-merged by mkosi.
#
# Layered on top of image/mkosi.conf:
#  - Adds the Ubuntu snapshot mirror + NVIDIA CUDA apt repo via
#    mkosi.pkgmngr/ (build-time) and mkosi.skeleton/ (rootfs-time).
#  - Pulls in the version-pinned NVIDIA driver + CUDA 12.8 +
#    DKMS + Python so the rootfs has the inference stack baked in.
#  - Installs vLLM + nv-attestation-sdk into venvs via
#    mkosi.postinst.chroot (step 3b — see that file for details).

[Distribution]
# Pin Ubuntu repositories to a fixed snapshot so the .deb files
# are byte-identical across builds. Without this, the rootfs
# squashfs hash (and therefore the verity roothash → RTMR) drifts
# between machines and over time even though every package version
# is pinned. Date matches confer-image's mkosi.conf.
Mirror=https://snapshot.ubuntu.com/ubuntu/20260209T000000Z
# Without `universe`, faketime + several CUDA-adjacent packages are
# "no installation candidate". mkosi's default for Ubuntu is `main`
# only.
Repositories=universe

[Content]
# A kernel package in Packages= flips mkosi's Bootable=auto to "yes"
# and it tries to build its own UKI + kernel-modules initrd, calling
# `modinfo --set-version` against the build sandbox's busybox modinfo
# (which doesn't grok --set-version). We don't use mkosi's UKI/initrd
# anyway — image/Makefile drives ukify directly with our own
# mkinitrd.sh output. Force Bootable=no so mkosi just lays down the
# kernel + modules in the rootfs and steps aside.
Bootable=no
# Override the base mkosi.conf's WithRecommends=false. The base image
# is intentionally minimal (just busybox + ca-certificates) and Recom-
# mends would bloat it for no reason. The llm-cuda target is the
# opposite — confer-image proves that NVIDIA driver + CUDA + DKMS
# only resolve cleanly when apt is allowed to follow the Recommends
# chain (the libnvidia-gl-580 dep graph in particular cascades
# through X11/wayland packages that aren't strictly required at
# runtime but are needed for the resolver to converge).
WithRecommends=true
# mkosi.pkgmngr/ ships the apt config mkosi sees at build time
# (Ubuntu snapshot + NVIDIA CUDA repo + signing keys). Without it,
# mkosi can't fetch the cuda-* packages below — they're not in
# Ubuntu's main archive.
PackageManagerTrees=mkosi.pkgmngr
Packages=
    python3
    # Packaged kernel + headers — TARGET_USE_PACKAGED_KERNEL=yes
    # makes the Makefile read the kernel from the rootfs instead of
    # the host (see image/targets/llm-cuda/profile.env). DKMS uses
    # the headers to build nvidia-driver kernel modules during the
    # mkosi.postinst.chroot phase against the same kernel that ends
    # up in the UKI.
    linux-generic-hwe-24.04
    linux-headers-generic-hwe-24.04
    dkms
    # NVIDIA driver — version pins exactly match
    # ConferLabs/confer-image so any byte-equivalent build pulls the
    # same .debs from the Ubuntu+NVIDIA snapshots. -open is the
    # MIT/GPL kernel module variant required for H100 confidential-
    # compute mode (the proprietary closed-source variant doesn't
    # support TDX guest attestation).
    nvidia-driver-580-open=580.126.20-1ubuntu1
    nvidia-persistenced=580.126.20-1ubuntu1
    # nvidia-fabricmanager + libnvidia-nscq are NVL/NVSwitch-only;
    # bake them in so a multi-GPU H100 host has them ready, but
    # the daemons stay disabled on single-GPU hosts (the ee-gpu-
    # evidence helper handles the no-fabric case in step 3b).
    nvidia-fabricmanager=580.126.20-1
    libnvidia-nscq=580.126.20-1
    # CUDA 12.8 runtime + dev headers — minimum viable set for
    # running PyTorch wheels (vLLM's heavy dependency). The full
    # CUDA toolkit (cuda-* meta-package) pulls ~6 GB of build
    # tools we don't need at runtime.
    cuda-cudart-12-8=12.8.90-1
    cuda-cudart-dev-12-8=12.8.90-1
    cuda-cccl-12-8=12.8.90-1
    cuda-driver-dev-12-8=12.8.90-1
    cuda-nvrtc-dev-12-8=12.8.93-1
    libcurand-dev-12-8=10.3.9.90-1
    libcublas-dev-12-8=12.8.4.1-1
    # faketime: used by step 3b's mkosi.postinst.chroot to clamp
    # pip-install timestamps.
    faketime
    # Transitive deps the base mkosi.conf's `WithRecommends=false`
    # would otherwise leave un-installed. The base image gets away
    # with a 2-package list (ca-certificates, busybox-static)
    # because it's intentionally minimal; once we ask for nvidia-
    # driver-* + cuda-* + dkms + python3 the dep graph blows up
    # without these. List cribbed from
    # confer-image/mkosi.conf — the same packages they explicitly
    # declare for the same reason.
    systemd
    udev
    dbus
    adduser
    ubuntu-keyring
    openssl
    kmod
    build-essential
    pciutils
    zstd
