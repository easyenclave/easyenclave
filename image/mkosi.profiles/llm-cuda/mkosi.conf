# Profile overlay: applied only when `mkosi --profile=llm-cuda`.
# Sibling files under mkosi.profiles/llm-cuda/mkosi.extra/ are auto-merged
# into the rootfs as additional ExtraTrees by mkosi.
#
# Concept #1 scaffolding: this overlay deliberately stays minimal. It adds
# Python (so vllm-serve can exec a real interpreter once vLLM is baked) and
# leaves the heavyweight NVIDIA driver + CUDA + vLLM bake for a follow-up
# concept. See README "LLM target" section for the deferred work.
#
# When that follow-up lands, the additions look approximately like
# (cribbed from ConferLabs/confer-image mkosi.conf):
#
#   [Distribution]
#   Repositories=
#       universe
#
#   [Content]
#   Packages=
#       linux-generic-hwe-24.04
#       linux-headers-generic-hwe-24.04
#       dkms
#       nvidia-driver-580-open
#       nvidia-persistenced
#       nvidia-fabricmanager
#       libnvidia-nscq
#       cuda-cudart-12-8
#       cuda-cudart-dev-12-8
#       libcurand-dev-12-8
#       libcublas-dev-12-8
#       cuda-nvcc-12-8
#       cuda-nvrtc-dev-12-8
#       python3
#       python3-pip
#       python3-venv
#
# vLLM + nv-attestation-sdk are pip-installed in mkosi.postinst.chroot
# (split into two virtualenvs because their dependency pins conflict —
# see confer-image mkosi.postinst stages 1+2).
#
# nv-attestation-sdk venv at /opt/venv-attestation backs the
# /usr/local/bin/ee-gpu-evidence helper (the wire-protocol producer
# that easyenclave shells out to during `attest`). Required pins,
# cribbed from confer-image/requirements-attestation.lock:
#
#   nv-attestation-sdk==2.6.3
#   nv-local-gpu-verifier==2.6.3
#   nv-ppcie-verifier==1.6.4    # only needed if also doing local
#                                 # verification; can be omitted if
#                                 # ITA does the appraisal end-to-end
#   nvidia-ml-py==12.550.52
#
# Once that venv is in place, replace the stub
# image/mkosi.profiles/llm-cuda/mkosi.extra/usr/local/bin/ee-gpu-evidence
# with the real Python entry that emits a length-prefixed
# (gpu_report, switch_report) frame on stdout (protocol spec in
# docs/gpu-attestation.md and src/attestation/nvgpu.rs).

[Content]
# A kernel package in Packages= flips mkosi's Bootable=auto to "yes"
# and it tries to build its own UKI + kernel-modules initrd, calling
# `modinfo --set-version` against the build sandbox's busybox modinfo
# (which doesn't grok --set-version). We don't use mkosi's UKI/initrd
# anyway — image/Makefile drives ukify directly with our own
# mkinitrd.sh output. Force Bootable=no so mkosi just lays down the
# kernel + modules in the rootfs and steps aside.
Bootable=no
Packages=
    python3
    # Packaged kernel + headers — TARGET_USE_PACKAGED_KERNEL=yes makes
    # the Makefile read the kernel from the rootfs instead of the host
    # (see image/targets/llm-cuda/profile.env). Headers are pre-staged
    # for DKMS even though the actual nvidia-driver-* DKMS bake hasn't
    # landed yet — keeps the kernel-package install ordered correctly
    # so a follow-up commit only needs to add `dkms` + the driver.
    linux-generic-hwe-24.04
    linux-headers-generic-hwe-24.04
