# Profile overlay: applied only when `mkosi --profile=llm-cuda`.
# Sibling files under mkosi.profiles/llm-cuda/mkosi.extra/ are auto-merged
# into the rootfs as additional ExtraTrees by mkosi.
#
# Concept #1 scaffolding: this overlay deliberately stays minimal. It adds
# Python (so vllm-serve can exec a real interpreter once vLLM is baked) and
# leaves the heavyweight NVIDIA driver + CUDA + vLLM bake for a follow-up
# concept. See README "LLM target" section for the deferred work.
#
# When that follow-up lands, the additions look approximately like
# (cribbed from ConferLabs/confer-image mkosi.conf):
#
#   [Distribution]
#   Repositories=
#       universe
#
#   [Content]
#   Packages=
#       linux-generic-hwe-24.04
#       linux-headers-generic-hwe-24.04
#       dkms
#       nvidia-driver-580-open
#       nvidia-persistenced
#       nvidia-fabricmanager
#       libnvidia-nscq
#       cuda-cudart-12-8
#       cuda-cudart-dev-12-8
#       libcurand-dev-12-8
#       libcublas-dev-12-8
#       cuda-nvcc-12-8
#       cuda-nvrtc-dev-12-8
#       python3
#       python3-pip
#       python3-venv
#
# vLLM + nv-attestation-sdk are pip-installed in mkosi.postinst.chroot
# (split into two virtualenvs because their dependency pins conflict —
# see confer-image mkosi.postinst stages 1+2).

[Content]
Packages=
    python3
