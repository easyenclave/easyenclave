openapi: 3.0.3
info:
  title: EasyEnclave Control Plane API
  version: "0.1.0"
  description: Minimal control-plane contract used by ee-agent bootstrap.
paths:
  /health:
    get:
      summary: Health probe
      operationId: health
      responses:
        "200":
          description: Control plane is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/agents/challenge:
    get:
      summary: Issue a nonce for attestation quote binding
      operationId: getAgentChallenge
      responses:
        "200":
          description: Nonce issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentChallengeResponse"
  /api/agents/register:
    post:
      summary: Register agent with attestation proof
      operationId: registerAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRegisterRequest"
      responses:
        "200":
          description: Agent registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRegisterResponse"
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Attestation or nonce verification failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: VM name conflict.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "502":
          description: Upstream tunnel provisioning failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        boot_id:
          type: string
          nullable: true
        git_sha:
          type: string
          nullable: true
    AgentChallengeResponse:
      type: object
      required: [nonce, expires_in_seconds]
      properties:
        nonce:
          type: string
        expires_in_seconds:
          type: integer
          format: uint64
          minimum: 1
    AgentRegisterRequest:
      type: object
      required: [intel_ta_token, vm_name, nonce]
      properties:
        intel_ta_token:
          type: string
        vm_name:
          type: string
        nonce:
          type: string
        node_size:
          type: string
          nullable: true
        datacenter:
          type: string
          nullable: true
        github_owner:
          type: string
          nullable: true
    AgentRegisterResponse:
      type: object
      required: [agent_id, tunnel_token, hostname]
      properties:
        agent_id:
          type: string
          format: uuid
        tunnel_token:
          type: string
        hostname:
          type: string
    ApiErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
          nullable: true
