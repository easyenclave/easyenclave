# PR Staging Checks
#
# Pull-request checks plus rust-staging smoke validation.
# Smoke job runs only for same-repo PRs (secrets are not exposed to forks).

name: PR Staging Checks

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "infra/**"
      - "crates/ee-ops/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "docs/**"
      - "www/**"
      - ".github/workflows/**"
      - "Dockerfile.ee-cp"
      - "requirements.txt"
      - "pyproject.toml"

concurrency:
  group: easyenclave-pr-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-policy:
    name: Workflow policy checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          set -euo pipefail
          curl -sL https://github.com/rhysd/actionlint/releases/download/v1.7.10/actionlint_1.7.10_linux_amd64.tar.gz | tar xz
          sudo mv actionlint /usr/local/bin/

      - name: Lint workflows
        run: actionlint

      - name: Enforce canonical rollout triggers
        shell: bash
        run: |
          set -euo pipefail
          contains() {
            local pattern="$1"
            local file="$2"
            if command -v rg >/dev/null 2>&1; then
              rg -n "$pattern" "$file" -S >/dev/null
            else
              grep -En "$pattern" "$file" >/dev/null
            fi
          }
          # PRs should stage; main pushes should production.
          if ! contains "pull_request:" .github/workflows/staging-rollout.yml; then
            echo "::error::staging-rollout.yml must include pull_request trigger."
            exit 1
          fi
          if ! contains "push:" .github/workflows/production-rollout.yml; then
            echo "::error::production-rollout.yml must include push trigger."
            exit 1
          fi
          if ! contains "workflow_dispatch:" .github/workflows/production-rollout.yml; then
            echo "::error::production-rollout.yml must include workflow_dispatch trigger."
            exit 1
          fi
          if contains "pull_request:" .github/workflows/production-rollout.yml; then
            echo "::error::production-rollout.yml must not include pull_request trigger."
            exit 1
          fi

  rust-staging-smoke-pr:
    name: Rust staging smoke (PR)
    if: github.event.pull_request.head.repo.full_name == github.repository
    needs: [workflow-policy]
    runs-on: ubuntu-latest
    env:
      CP_URL: ${{ vars.STAGING_CP_URL || 'https://app-staging.easyenclave.com' }}
    steps:
      - name: Verify staging rust CP health + agents
        shell: bash
        run: |
          set -euo pipefail
          fetch_agents() {
            local body
            body="$(curl -fsS "$CP_URL/api/agents" 2>/tmp/pr_staging_agents.err || true)"
            if [ -n "${body:-}" ]; then
              echo "$body"
              return 0
            fi
            body="$(curl -fsS "$CP_URL/api/v1/agents" 2>/tmp/pr_staging_agents.err || true)"
            if [ -n "${body:-}" ]; then
              echo "$body"
              return 0
            fi
            return 1
          }
          health="$(curl -fsS "$CP_URL/health" 2>/tmp/pr_staging_health.err || true)"
          if [ -z "${health:-}" ]; then
            echo "::warning::Skipping staging smoke check: '${CP_URL}/health' is not reachable."
            if [ -f /tmp/pr_staging_health.err ]; then
              cat /tmp/pr_staging_health.err || true
            fi
            exit 0
          fi
          echo "$health" | jq -e '.ok == true' >/dev/null
          agents="$(fetch_agents || true)"
          if [ -z "${agents:-}" ]; then
            echo "::warning::Skipping staging agent snapshot: '${CP_URL}/api/agents' is not reachable (also tried /api/v1/agents)."
            if [ -f /tmp/pr_staging_agents.err ]; then
              cat /tmp/pr_staging_agents.err || true
            fi
            exit 0
          fi
          total="$(echo "$agents" | jq -r '(if type == "array" then . else (.agents // []) end) | length')"
          verified="$(echo "$agents" | jq -r '(if type == "array" then . else (.agents // []) end) | [ .[] | select(.verified == true) ] | length')"
          echo "rust staging snapshot: verified=${verified} total=${total}"
