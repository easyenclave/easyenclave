name: Staging Deploy

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "src/**"
      - "migrations/**"
      - "tests/**"
      - "examples/private-llm/**"
      - "infra/**"
      - "ansible/**"
      - "packer/**"
      - "scripts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/**"
      - "Dockerfile.ee-cp"
  workflow_dispatch:

concurrency:
  group: easyenclave-staging-deploy
  cancel-in-progress: true

env:
  SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
  GCP_PROJECT_ID: ${{ secrets.STAGING_GCP_PROJECT_ID || 'eestaging' }}
  GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.STAGING_GCP_SERVICE_ACCOUNT_KEY }}
  GCP_ZONE: ${{ vars.STAGING_GCP_ZONE || 'us-central1-a' }}
  EE_GCP_FALLBACK_ZONES: ${{ vars.STAGING_GCP_FALLBACK_ZONES || 'us-central1-b,us-central1-c,us-central1-f' }}
  BUILD_ZONE: ${{ vars.STAGING_GCP_IMAGE_BUILD_ZONE || 'us-central1-a' }}
  BUILD_FALLBACK_ZONES: ${{ vars.STAGING_GCP_IMAGE_BUILD_FALLBACK_ZONES || 'us-central1-b,us-central1-c,us-central1-f' }}
  BUILD_MACHINE_TYPE: ${{ vars.STAGING_GCP_IMAGE_BUILD_MACHINE_TYPE || 'e2-standard-4' }}
  BUILD_BOOT_DISK_GB: ${{ vars.STAGING_GCP_IMAGE_BUILD_BOOT_DISK_GB || '80' }}
  EASYENCLAVE_DOMAIN: ${{ vars.STAGING_EASYENCLAVE_DOMAIN || 'easyenclave.com' }}
  STAGING_CP_URL: ${{ vars.STAGING_CP_URL || format('https://app-staging.{0}', vars.STAGING_EASYENCLAVE_DOMAIN || 'easyenclave.com') }}

jobs:
  skip-fork:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Skip fork PRs
        run: echo "Skipping staging deploy for fork PR (secrets are unavailable)."

  prep:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sha12: ${{ steps.vars.outputs.sha12 }}
      network_name: ${{ steps.vars.outputs.network_name }}
      release_tag: ${{ steps.vars.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Lint + test
        run: |
          cargo fmt --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      - name: Resolve rollout vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          sha12="$(echo "${SOURCE_SHA}" | cut -c1-12)"
          {
            echo "sha12=${sha12}"
            echo "network_name=staging"
            echo "release_tag=staging-${sha12}"
          } >> "$GITHUB_OUTPUT"

      - name: Build ee-agent release binary
        run: cargo build --bin ee-agent --release

      - name: Upload ee-agent binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-ee-agent-bin-${{ github.run_id }}
          path: target/release/ee-agent
          if-no-files-found: error

  build_cp_image:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs: prep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.cp_image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Build and push control plane image
        id: cp_image
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY}/control-plane-rust:${SOURCE_SHA}"
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build -f Dockerfile.ee-cp -t "${image}" .
          docker push "${image}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

  bake_agent_image:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs: prep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Install Ansible
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Download ee-agent binary artifact
        uses: actions/download-artifact@v4
        with:
          name: staging-ee-agent-bin-${{ github.run_id }}
          path: /tmp/staging-ee-agent-bin

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up Packer
        uses: hashicorp/setup-packer@v3

      - name: Bake staging GCP image for commit
        shell: bash
        env:
          ANSIBLE_CONFIG: ansible/ansible.cfg
        run: |
          set -euo pipefail
          chmod 0755 "/tmp/staging-ee-agent-bin/ee-agent"
          ansible-playbook ansible/playbooks/gcp-image-bake.yml \
            -e "source_image_project=ubuntu-os-cloud" \
            -e "source_image_family=ubuntu-2404-lts-amd64" \
            -e "target_image_name=easyenclave-agent-main-${{ needs.prep.outputs.sha12 }}" \
            -e "target_image_family=easyenclave-agent-main" \
            -e "target_image_description=EasyEnclave staging commit ${SOURCE_SHA}" \
            -e "target_image_labels=easyenclave=managed,easyenclave_env=staging,gitsha=${{ needs.prep.outputs.sha12 }}" \
            -e "source_sha=${SOURCE_SHA}" \
            -e "ee_agent_binary_path=/tmp/staging-ee-agent-bin/ee-agent"

  deploy:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs:
      - prep
      - build_cp_image
      - bake_agent_image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Install Ansible
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Cleanup managed staging VMs via Ansible
        shell: bash
        env:
          ANSIBLE_CONFIG: ansible/ansible.cfg
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          EASYENCLAVE_DOMAIN: ${{ env.EASYENCLAVE_DOMAIN }}
        run: |
          set -euo pipefail
          ansible-playbook ansible/playbooks/gcp-cleanup-managed-vms.yml \
            -e "ee_env_name=staging"

      - name: Deploy staging control plane and agent
        id: deploy
        shell: bash
        env:
          AGENT_DATACENTER_AZ: ${{ env.GCP_ZONE }}
          ADMIN_PASSWORD: ${{ secrets.CP_ADMIN_PASSWORD }}
          ADMIN_GITHUB_LOGINS: ${{ secrets.ADMIN_GITHUB_LOGINS }}
          ITA_API_KEY: ${{ secrets.ITA_API_KEY || secrets.INTEL_API_KEY }}
          EE_AGENT_ITA_API_KEY: ${{ secrets.ITA_API_KEY || secrets.INTEL_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CP_MEASUREMENTS_SIGNING_KEY: ${{ secrets.STAGING_CP_MEASUREMENTS_SIGNING_KEY || secrets.CP_MEASUREMENTS_SIGNING_KEY }}
          EASYENCLAVE_ENV: staging
          EASYENCLAVE_NETWORK_NAME: ${{ needs.prep.outputs.network_name }}
          EASYENCLAVE_RELEASE_TAG: ${{ needs.prep.outputs.release_tag }}
          EASYENCLAVE_GIT_SHA: ${{ env.SOURCE_SHA }}
          CONTROL_PLANE_IMAGE: ${{ needs.build_cp_image.outputs.image }}
          NUM_TINY_AGENTS: "1"
          NUM_STANDARD_AGENTS: "0"
          NUM_LLM_AGENTS: "0"
          TCB_ENFORCEMENT_MODE: warn
          ALLOWED_TCB_STATUSES: UpToDate
          NONCE_ENFORCEMENT_MODE: optional
          RTMR_ENFORCEMENT_MODE: warn
          SIGNATURE_VERIFICATION_MODE: warn
          CP_TO_AGENT_ATTESTATION_MODE: optional
          AUTH_REQUIRE_GITHUB_OAUTH_IN_PRODUCTION: "false"
          PASSWORD_LOGIN_ENABLED: "true"
          AUTH_ALLOW_PASSWORD_LOGIN_IN_PRODUCTION: "true"
          CP_GITHUB_OIDC_AUDIENCE: easyenclave
          BILLING_ENABLED: "false"
          BILLING_CAPACITY_REQUEST_DEV_SIMULATION: "true"
          GITHUB_OAUTH_CLIENT_ID: ${{ secrets.STAGING_EE_GITHUB_OAUTH_CLIENT_ID }}
          GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.STAGING_EE_GITHUB_OAUTH_CLIENT_SECRET }}
          GITHUB_OAUTH_REDIRECT_URI: ${{ format('https://app-staging.{0}/auth/github/callback', env.EASYENCLAVE_DOMAIN) }}
          EE_GCP_IMAGE_FAMILY: easyenclave-agent-main
          CI_DEPLOY_TIMEOUT_SECONDS: "1200"
          CP_BOOTSTRAP_TIMEOUT: "600"
          AGENT_VERIFY_WAIT_ATTEMPTS: "48"
          AGENT_VERIFY_WAIT_SECONDS: "5"
          ANSIBLE_CONFIG: ansible/ansible.cfg
        run: |
          set -euo pipefail
          timeout 1300 ansible-playbook -v ansible/playbooks/gcp-deploy.yml \
            -e "cp_port=8080" \
            -e "cp_bootstrap_timeout=${CP_BOOTSTRAP_TIMEOUT}" \
            -e "num_tiny_agents=${NUM_TINY_AGENTS}" \
            -e "num_standard_agents=${NUM_STANDARD_AGENTS}" \
            -e "num_llm_agents=${NUM_LLM_AGENTS}" \
            -e "orchestration_provider=gcp" \
            -e "agent_datacenter_az=${AGENT_DATACENTER_AZ}" \
            -e "agent_verify_wait_attempts=${AGENT_VERIFY_WAIT_ATTEMPTS}" \
            -e "agent_verify_wait_seconds=${AGENT_VERIFY_WAIT_SECONDS}" \
            -e "output_json_path=/tmp/ci-deploy-output.json" 2>&1 | tee /tmp/ci-deploy.log

      - name: Smoke check staging (public URL)
        shell: bash
        run: |
          set -euo pipefail
          CURL_ARGS=(--connect-timeout 3 --max-time 8)
          ok=0
          for _ in $(seq 1 36); do
            if curl -fsS "${CURL_ARGS[@]}" "${STAGING_CP_URL}/health" >/tmp/staging-health.json 2>/tmp/staging-health.err; then
              ok=1
              break
            fi
            sleep 5
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::Public staging health check failed for ${STAGING_CP_URL}/health"
            cat /tmp/staging-health.err || true
            exit 1
          fi
          jq . < /tmp/staging-health.json

      - name: Dump GCP serial logs on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          gcloud compute instances list --project "${GCP_PROJECT_ID}" \
            --filter "labels.easyenclave=managed" \
            --format "value(name,zone)" > /tmp/staging_instances.txt || true
          while read -r name zone; do
            [ -n "${name:-}" ] || continue
            [ -n "${zone:-}" ] || continue
            zone_short="${zone##*/}"
            echo "===== ${name} (${zone_short}) ====="
            gcloud compute instances get-serial-port-output "${name}" \
              --project "${GCP_PROJECT_ID}" \
              --zone "${zone_short}" \
              --port 1 | tail -n 200 || true
            if [[ "${name}" == ee-cp-* ]]; then
              echo "===== ${name} (${zone_short}) control-plane container logs ====="
              gcloud compute ssh "${name}" \
                --project "${GCP_PROJECT_ID}" \
                --zone "${zone_short}" \
                --quiet \
                --command "sudo docker logs --tail 200 easyenclave-control-plane || true" || true
            fi
          done < /tmp/staging_instances.txt

      - name: Upload deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-deploy-log-${{ github.run_id }}
          path: /tmp/ci-deploy.log
          if-no-files-found: ignore

  ensure_baremetal_llm_agent:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs:
      - deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      datacenter: ${{ steps.cfg.outputs.datacenter }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Configure SSH access to bare-metal host
        id: ssh
        shell: bash
        env:
          SSH_HOST: ${{ vars.STAGING_BAREMETAL_SSH_HOST || '' }}
          SSH_PORT: ${{ vars.STAGING_BAREMETAL_SSH_PORT || '22' }}
          SSH_USER: ${{ vars.STAGING_BAREMETAL_SSH_USER || '' }}
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_BAREMETAL_SSH_PRIVATE_KEY || '' }}
        run: |
          set -euo pipefail

          for required_var in SSH_HOST SSH_USER SSH_PRIVATE_KEY; do
            if [ -z "${!required_var}" ]; then
              echo "::error::Set ${required_var} for staging bare-metal SSH access"
              exit 1
            fi
          done

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "$HOME/.ssh/staging_baremetal_key"
          chmod 600 "$HOME/.ssh/staging_baremetal_key"
          ssh-keyscan -p "${SSH_PORT}" -H "${SSH_HOST}" >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          ssh_target="${SSH_USER}@${SSH_HOST}"
          ssh -i "$HOME/.ssh/staging_baremetal_key" -p "${SSH_PORT}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${ssh_target}" "hostname -s >/dev/null || hostname >/dev/null"

          {
            echo "ssh_target=${ssh_target}"
            echo "ssh_port=${SSH_PORT}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve bare-metal SSH config
        id: cfg
        shell: bash
        env:
          SSH_TARGET: ${{ steps.ssh.outputs.ssh_target }}
          SSH_PORT: ${{ steps.ssh.outputs.ssh_port }}
          INPUT_ZONE: ${{ vars.STAGING_BAREMETAL_AGENT_ZONE || '' }}
          INPUT_REGION: ${{ vars.STAGING_BAREMETAL_AGENT_REGION || '' }}
          INPUT_DATACENTER: ${{ vars.STAGING_BAREMETAL_AGENT_DATACENTER || '' }}
          INPUT_REPO_DIR: ${{ vars.STAGING_BAREMETAL_REPO_DIR || '' }}
          INPUT_GPU_PCI_BDF: ${{ vars.STAGING_BAREMETAL_GPU_PCI_BDF || '' }}
          INPUT_TDX_RUNNER_COMMAND: ${{ vars.STAGING_BAREMETAL_TDX_RUNNER_COMMAND || '' }}
          INPUT_TDX_RUNNER_EXTRA_ARGS: ${{ vars.STAGING_BAREMETAL_TDX_RUNNER_EXTRA_ARGS || '' }}
        run: |
          set -euo pipefail

          slugify() {
            local value="$1"
            value="$(printf '%s' "${value}" | tr '[:upper:]' '[:lower:]')"
            value="$(printf '%s' "${value}" | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g')"
            if [ -z "${value}" ]; then
              value="tdx-worker"
            fi
            printf '%s' "${value}"
          }

          remote_host_name="$(ssh -i "$HOME/.ssh/staging_baremetal_key" -p "${SSH_PORT}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${SSH_TARGET}" "hostname -s || hostname")"
          runner_slug="$(slugify "${remote_host_name:-${SSH_TARGET}}")"
          zone="${INPUT_ZONE:-${runner_slug}}"
          region="${INPUT_REGION:-}"
          datacenter="${INPUT_DATACENTER:-baremetal:${runner_slug}}"
          remote_repo_dir="${INPUT_REPO_DIR:-/tmp/easyenclave-staging-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}}"
          gpu_pci_bdf="${INPUT_GPU_PCI_BDF:-}"
          tdx_runner_command="${INPUT_TDX_RUNNER_COMMAND:-python3 infra/tdx_cli.py vm new}"
          tdx_runner_extra_args="${INPUT_TDX_RUNNER_EXTRA_ARGS:-}"
          if [ -z "${tdx_runner_extra_args}" ] && [ -n "${gpu_pci_bdf}" ]; then
            tdx_runner_extra_args="--hostdev-pci ${gpu_pci_bdf}"
          fi

          if [ -z "${tdx_runner_extra_args}" ]; then
            echo "::error::Set STAGING_BAREMETAL_TDX_RUNNER_EXTRA_ARGS or STAGING_BAREMETAL_GPU_PCI_BDF for the bare-metal SSH target"
            exit 1
          fi

          {
            echo "zone=${zone}"
            echo "region=${region}"
            echo "datacenter=${datacenter}"
            echo "remote_repo_dir=${remote_repo_dir}"
            echo "tdx_runner_command=${tdx_runner_command}"
            echo "tdx_runner_extra_args=${tdx_runner_extra_args}"
          } >> "$GITHUB_OUTPUT"

      - name: Check H100 llm capacity in target datacenter
        id: capacity
        shell: bash
        env:
          CP_URL: ${{ env.STAGING_CP_URL }}
          DATACENTER: ${{ steps.cfg.outputs.datacenter }}
        run: |
          set -euo pipefail

          agents="$(curl -fsS "${CP_URL}/api/agents")"
          counts="$(AGENTS_JSON="${agents}" python3 - <<'PY'
          import json
          import os

          datacenter = os.environ["DATACENTER"]
          items = json.loads(os.environ["AGENTS_JSON"])
          ready = 0
          busy = 0
          for item in items:
              if (item.get("node_size") or "") != "llm":
                  continue
              if (item.get("datacenter") or "") != datacenter:
                  continue
              if (item.get("registration_state") or "") != "ready":
                  continue
              if item.get("attestation_verified") is not True:
                  continue
              if (item.get("status") or "") == "undeployed":
                  ready += 1
              else:
                  busy += 1
          print(f"{ready} {busy}")
          PY
          )"
          read -r ready_undeployed busy_count <<<"${counts}"

          if [ "${ready_undeployed}" -gt 0 ]; then
            echo "launch=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${busy_count}" -gt 0 ]; then
            echo "::error::Datacenter ${DATACENTER} already has a busy llm agent; free it before launching another H100 VM"
            exit 1
          fi

          echo "launch=true" >> "$GITHUB_OUTPUT"

      - name: Sync repo checkout to bare-metal host
        if: steps.capacity.outputs.launch == 'true'
        shell: bash
        env:
          SSH_TARGET: ${{ steps.ssh.outputs.ssh_target }}
          SSH_PORT: ${{ steps.ssh.outputs.ssh_port }}
          REMOTE_REPO_DIR: ${{ steps.cfg.outputs.remote_repo_dir }}
        run: |
          set -euo pipefail

          case "${REMOTE_REPO_DIR}" in
            ""|"/")
              echo "::error::Unsafe STAGING_BAREMETAL_REPO_DIR value: ${REMOTE_REPO_DIR}"
              exit 1
              ;;
          esac

          remote_repo_dir_q="$(printf '%q' "${REMOTE_REPO_DIR}")"

          ssh -i "$HOME/.ssh/staging_baremetal_key" -p "${SSH_PORT}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${SSH_TARGET}" "bash -lc 'rm -rf -- ${remote_repo_dir_q} && mkdir -p -- ${remote_repo_dir_q}'"

          tar --exclude=.git --exclude=target -czf - . | \
            ssh -i "$HOME/.ssh/staging_baremetal_key" -p "${SSH_PORT}" \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=yes \
              "${SSH_TARGET}" "bash -lc 'tar -xzf - -C ${remote_repo_dir_q}'"

      - name: Launch bare-metal H100 llm agent via remote Ansible
        if: steps.capacity.outputs.launch == 'true'
        shell: bash
        env:
          SSH_TARGET: ${{ steps.ssh.outputs.ssh_target }}
          SSH_PORT: ${{ steps.ssh.outputs.ssh_port }}
          REMOTE_REPO_DIR: ${{ steps.cfg.outputs.remote_repo_dir }}
          CP_URL: ${{ env.STAGING_CP_URL }}
          ITA_API_KEY: ${{ secrets.ITA_API_KEY || secrets.INTEL_API_KEY }}
          ZONE: ${{ steps.cfg.outputs.zone }}
          REGION: ${{ steps.cfg.outputs.region }}
          DATACENTER: ${{ steps.cfg.outputs.datacenter }}
          TDX_RUNNER_COMMAND: ${{ steps.cfg.outputs.tdx_runner_command }}
          TDX_RUNNER_EXTRA_ARGS: ${{ steps.cfg.outputs.tdx_runner_extra_args }}
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/staging_baremetal_key" -p "${SSH_PORT}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${SSH_TARGET}" "\
              REMOTE_REPO_DIR=$(printf '%q' "${REMOTE_REPO_DIR}") \
              CP_URL=$(printf '%q' "${CP_URL}") \
              ITA_API_KEY=$(printf '%q' "${ITA_API_KEY}") \
              ZONE=$(printf '%q' "${ZONE}") \
              REGION=$(printf '%q' "${REGION}") \
              DATACENTER=$(printf '%q' "${DATACENTER}") \
              TDX_RUNNER_COMMAND=$(printf '%q' "${TDX_RUNNER_COMMAND}") \
              TDX_RUNNER_EXTRA_ARGS=$(printf '%q' "${TDX_RUNNER_EXTRA_ARGS}") \
              bash -s" <<'REMOTE'
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          if ! command -v ansible-playbook >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1 && command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y ansible
            else
              python3 -m pip install --user ansible
            fi
          fi

          cd "${REMOTE_REPO_DIR}"
          export ANSIBLE_CONFIG=ansible/ansible.cfg

          timeout 1200 ansible-playbook ansible/playbooks/baremetal-vm-fleet-new.yml \
            -e "cp_url=${CP_URL}" \
            -e "ita_api_key=${ITA_API_KEY}" \
            -e "num_llm=1" \
            -e "vm_timeout_seconds=900" \
            -e "agent_zone=${ZONE}" \
            -e "agent_region=${REGION}" \
            -e "agent_datacenter=${DATACENTER}" \
            -e "tdx_runner_command=${TDX_RUNNER_COMMAND}" \
            -e "tdx_runner_extra_args=${TDX_RUNNER_EXTRA_ARGS}"
          REMOTE

      - name: Wait for ready undeployed H100 llm agent
        shell: bash
        env:
          CP_URL: ${{ env.STAGING_CP_URL }}
          DATACENTER: ${{ steps.cfg.outputs.datacenter }}
        run: |
          set -euo pipefail

          for _ in $(seq 1 60); do
            agents="$(curl -fsS "${CP_URL}/api/agents")"
            ready_undeployed="$(AGENTS_JSON="${agents}" python3 - <<'PY'
            import json
            import os

            datacenter = os.environ["DATACENTER"]
            items = json.loads(os.environ["AGENTS_JSON"])
            ready = 0
            for item in items:
                if (item.get("node_size") or "") != "llm":
                    continue
                if (item.get("datacenter") or "") != datacenter:
                    continue
                if (item.get("registration_state") or "") != "ready":
                    continue
                if item.get("attestation_verified") is not True:
                    continue
                if (item.get("status") or "") == "undeployed":
                    ready += 1
            print(ready)
            PY
            )"
            if [ "${ready_undeployed}" -gt 0 ]; then
              exit 0
            fi
            sleep 10
          done

          echo "::error::No ready undeployed llm agent appeared in ${DATACENTER}"
          exit 1

  deploy_private_llm:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs:
      - deploy
      - ensure_baremetal_llm_agent
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/deploy-examples.yml
    with:
      target_env: staging
      compose_file: examples/private-llm/docker-compose.cp.h100.yml
      model: qwen2.5:32b
      node_size: llm
      datacenter: ${{ needs.ensure_baremetal_llm_agent.outputs.datacenter }}
      dry_run: false
    secrets: inherit
