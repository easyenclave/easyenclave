name: Build & Release VM Image

# Build every target, spin up a real TDX VM per target, run an end-to-end
# enclave test, then publish the gcp image family + all artifacts.
#
# Pipeline:
#   meta ── build (matrix) ──┬── tdx-smoke (matrix: real TDX per target)
#                             ├── gcp-promote  (non-PR only)
#                             └── release      (non-PR only, gates on all above)

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - "image/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/image.yml"
  pull_request:
    paths:
      - "image/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/image.yml"
  workflow_dispatch:

concurrency:
  group: easyenclave-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Shared metadata (sha12, tag, release name, gcp image name) ──────
  meta:
    runs-on: ubuntu-latest
    outputs:
      sha12: ${{ steps.s.outputs.sha12 }}
      tag: ${{ steps.s.outputs.tag }}
      release_name: ${{ steps.s.outputs.release_name }}
      gcp_name: ${{ steps.s.outputs.gcp_name }}
    steps:
      - id: s
        run: |
          SHA12=$(echo "${{ github.sha }}" | cut -c1-12)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            GCP_NAME="easyenclave-${TAG//./-}"
            RELEASE_NAME="easyenclave-${TAG}"
          else
            TAG=""
            GCP_NAME="easyenclave-${SHA12}"
            RELEASE_NAME="easyenclave-${SHA12}"
          fi
          {
            echo "sha12=${SHA12}"
            echo "tag=${TAG}"
            echo "release_name=${RELEASE_NAME}"
            echo "gcp_name=${GCP_NAME}"
          } >> "$GITHUB_OUTPUT"

  # ── Per-target image build ──────────────────────────────────────────
  build:
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # local-tdx-qcow2: a GPT-disk qcow2 with the `qemu` vendor stage —
        # libvirt-backing-file shape for `devopsdefender/dd` et al. Same
        # rootfs build as `gcp`, but without the GCE IMDS probe. Not in
        # the tdx-smoke matrix because its boot chain is all already
        # covered by `local-tdx` (squashfs/ISO) + `gcp` (GPT/ext4) and
        # dd's preview-deploy smokes it end-to-end against a real
        # workload on every release.
        target: [gcp, azure, local-tdx, local-tdx-qcow2]
    steps:
      - uses: actions/checkout@v4

      - name: Install apt build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            systemd-boot-efi systemd-ukify mtools cryptsetup-bin \
            busybox-static e2fsprogs dosfstools qemu-utils \
            zstd linux-image-generic \
            xorriso squashfs-tools

      - name: Resolve target kernel version
        id: kver
        run: |
          KVER=$(ls -1 /boot/vmlinuz-*-generic 2>/dev/null \
            | sed 's|/boot/vmlinuz-||' | sort -V | tail -1)
          [ -z "$KVER" ] && KVER=$(uname -r)
          echo "kver=$KVER" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mkosi v26
        run: |
          pip install 'git+https://github.com/systemd/mkosi.git@v26' pefile
          sudo ln -sf "$(which mkosi)" /usr/local/bin/mkosi

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build (TARGET=${{ matrix.target }})
        env:
          KVER: ${{ steps.kver.outputs.kver }}
          TARGET: ${{ matrix.target }}
        run: |
          cargo build --release
          cd image && make build KVER="$KVER" TARGET="$TARGET"

      - name: Rename + compute measurements
        env:
          TARGET: ${{ matrix.target }}
          SHA12: ${{ needs.meta.outputs.sha12 }}
        run: |
          cd image/output/${TARGET}
          UKI_SHA256=$(sha256sum easyenclave.efi | cut -d' ' -f1)
          mv easyenclave.efi "easyenclave-${SHA12}-${TARGET}.efi"
          {
            echo "commit: ${{ github.sha }}"
            echo "target: ${TARGET}"
            echo "UKI sha256: ${UKI_SHA256}"
          } > MEASUREMENTS.txt
          if [ -f easyenclave.root.raw ]; then
            RAW_SHA=$(sha256sum easyenclave.root.raw | cut -d' ' -f1)
            mv easyenclave.root.raw "easyenclave-${SHA12}-${TARGET}.raw"
            echo "Disk sha256: ${RAW_SHA}" >> MEASUREMENTS.txt
          fi
          if [ -f easyenclave.qcow2 ]; then
            QCOW_SHA=$(sha256sum easyenclave.qcow2 | cut -d' ' -f1)
            mv easyenclave.qcow2 "easyenclave-${SHA12}-${TARGET}.qcow2"
            echo "Qcow2 sha256: ${QCOW_SHA}" >> MEASUREMENTS.txt
          fi
          if [ -f easyenclave-gcp.tar.gz ]; then
            mv easyenclave-gcp.tar.gz "easyenclave-${SHA12}-gcp.tar.gz"
          fi
          if [ -f easyenclave.vhd ]; then
            VHD_SHA=$(sha256sum easyenclave.vhd | cut -d' ' -f1)
            mv easyenclave.vhd "easyenclave-${SHA12}-${TARGET}.vhd"
            echo "VHD sha256: ${VHD_SHA}" >> MEASUREMENTS.txt
          fi
          if [ -f easyenclave.iso ]; then
            ISO_SHA=$(sha256sum easyenclave.iso | cut -d' ' -f1)
            mv easyenclave.iso "easyenclave-${SHA12}-${TARGET}.iso"
            echo "ISO sha256: ${ISO_SHA}" >> MEASUREMENTS.txt
          fi
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: easyenclave-image-${{ matrix.target }}
          path: |
            image/output/${{ matrix.target }}/easyenclave-*
            image/output/${{ matrix.target }}/MEASUREMENTS.txt
          retention-days: 7

  # ── Real-TDX integration test per target ────────────────────────────
  # Each matrix entry provisions a real TDX VM on its platform, runs the
  # enclave through boot + attestation + workload-serve, tears down.
  # Skipped on fork PRs (would burn money / expose self-hosted-equivalent
  # SSH creds). See the per-target scripts under image/ci-tdx-smoke-*.sh.
  tdx-smoke:
    needs: [meta, build]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        target: [gcp, azure, local-tdx]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: easyenclave-image-${{ matrix.target }}
          path: image/output/${{ matrix.target }}

      # ── GCP auth (target=gcp only) ─────────────────────────────────
      - if: matrix.target == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/779946350556/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'easyenclave-github-provisioner@easyenclave.iam.gserviceaccount.com'
      - if: matrix.target == 'gcp'
        uses: google-github-actions/setup-gcloud@v2

      # ── Azure auth + CLI tools (target=azure only) ─────────────────
      - if: matrix.target == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - if: matrix.target == 'azure'
        name: Install AzCopy
        run: |
          curl -fsSL https://aka.ms/downloadazcopy-v10-linux | tar -xz
          sudo mv azcopy_linux_amd64_*/azcopy /usr/local/bin/
          azcopy --version

      # ── Local-TDX: SSH key staging (target=local-tdx only) ─────────
      - if: matrix.target == 'local-tdx'
        name: Stage SSH key for tdx2
        env:
          EE_LOCAL_SSH_KEY: ${{ secrets.EE_LOCAL_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$EE_LOCAL_SSH_KEY" > ~/.ssh/tdx2_key
          chmod 600 ~/.ssh/tdx2_key
          echo "EE_LOCAL_SSH_KEY_PATH=$HOME/.ssh/tdx2_key" >> "$GITHUB_ENV"

      # ── Run the per-target real-TDX smoke ──────────────────────────
      # All three targets must pass now. Previously `azure` had
      # continue-on-error while we iterated on its Azure-CLI specifics
      # (disk upload mode, SAS auth, SIG flow, SKU/region selection,
      # gallery region scoping) — those are all resolved. Keeping the
      # mask in place would hide future Azure regressions.
      - name: Real-TDX smoke (${{ matrix.target }})
        env:
          SHA12: ${{ needs.meta.outputs.sha12 }}
          GITHUB_SHA: ${{ github.sha }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          EE_LOCAL_HOST: ${{ secrets.EE_LOCAL_HOST }}
        run: bash image/ci-tdx-smoke-${{ matrix.target }}.sh

  # ── GCP image promotion (publishes staging / stable family) ─────────
  # Separate from tdx-smoke-gcp (which creates + deletes an ephemeral
  # image). This job publishes the image under a channel label (staging
  # on main, pr on PRs-from-same-repo, stable on tags) and rotates old
  # images. Skipped entirely on PRs — promotion is a merge-time action.
  gcp-promote:
    needs: [meta, build, tdx-smoke]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/779946350556/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'easyenclave-github-provisioner@easyenclave.iam.gserviceaccount.com'
      - uses: google-github-actions/setup-gcloud@v2
      - uses: actions/download-artifact@v4
        with:
          name: easyenclave-image-gcp
          path: image/output/gcp

      - name: Upload + create promoted image
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          SHA12: ${{ needs.meta.outputs.sha12 }}
          GCP_NAME: ${{ needs.meta.outputs.gcp_name }}
        run: |
          ASSET="easyenclave-${SHA12}-gcp.tar.gz"
          gcloud storage cp "image/output/gcp/${ASSET}" \
            "gs://${GCS_BUCKET}/${ASSET}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            FAMILY="--family=easyenclave-stable"
            CHANNEL="stable"
          else
            FAMILY="--family=easyenclave-staging"
            CHANNEL="staging"
          fi

          gcloud compute images create "${GCP_NAME}" \
            --project="${GCP_PROJECT}" \
            --source-uri="gs://${GCS_BUCKET}/${ASSET}" \
            ${FAMILY} \
            --guest-os-features=UEFI_COMPATIBLE,TDX_CAPABLE,GVNIC \
            --labels=easyenclave=image,channel=${CHANNEL},commit=${SHA12}

      - name: Rotate old promoted images
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud compute images list --project="${GCP_PROJECT}" \
            --filter="labels.easyenclave=image AND labels.channel=staging" \
            --format="value(name)" --sort-by="~creationTimestamp" \
            | tail -n +6 \
            | xargs -rI{} gcloud compute images delete {} \
                --project="${GCP_PROJECT}" --quiet

  # ── Release (non-PR only) ───────────────────────────────────────────
  release:
    needs: [meta, build, tdx-smoke, gcp-promote]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-stage
          pattern: easyenclave-image-*

      - name: Stage release assets
        env:
          SHA12: ${{ needs.meta.outputs.sha12 }}
        run: |
          mkdir -p release-out
          cd release-stage
          for target_dir in easyenclave-image-*; do
            target="${target_dir#easyenclave-image-}"
            for f in "${target_dir}"/easyenclave-*; do
              [ -f "$f" ] || continue
              cp "$f" ../release-out/
            done
            if [ -f "${target_dir}/MEASUREMENTS.txt" ]; then
              cp "${target_dir}/MEASUREMENTS.txt" "../release-out/MEASUREMENTS-${target}.txt"
            fi
          done
          cd ..
          ls -la release-out/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          SHA12: ${{ needs.meta.outputs.sha12 }}
          TAG: ${{ needs.meta.outputs.tag }}
          GCP_NAME: ${{ needs.meta.outputs.gcp_name }}
        run: |
          if [ -n "$TAG" ]; then
            GH_TAG="$TAG"
            PRERELEASE=""
          else
            GH_TAG="image-${SHA12}"
            PRERELEASE="--prerelease"
          fi

          NOTES_FILE=$(mktemp)
          {
            echo "## Artifacts by target"
            echo ""
            echo "- **gcp** — raw, qcow2, gcp-tar.gz (GCE import)"
            echo "- **azure** — raw, vhd (fixed-size, Azure Managed Disk import)"
            echo "- **local-tdx** — iso (hybrid, OVMF/TDVF boot)"
            echo ""
            echo "GCP image: \`${GCP_NAME}\`"
            echo ""
            for m in release-out/MEASUREMENTS-*.txt; do
              [ -f "$m" ] || continue
              target=$(basename "$m" .txt | sed 's/^MEASUREMENTS-//')
              echo "### MEASUREMENTS (${target})"
              echo ""
              echo '```'
              cat "$m"
              echo '```'
              echo ""
            done
          } > "$NOTES_FILE"

          gh release create "${GH_TAG}" ${PRERELEASE} \
            --title "${GH_TAG}" \
            --notes-file "${NOTES_FILE}" \
            release-out/*
