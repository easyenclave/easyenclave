name: Build & Release VM Image

# Build the sealed TDX VM image for every supported target on every
# push and PR. Each target gets a non-TDX QEMU smoke test; GCP also
# gets a full real-TDX integration test. Release job attaches all
# artifacts on main/tag.
#
# Pipeline:
#   meta ── build (matrix: gcp/azure/local-tdx) ──┬── smoke (matrix)
#                                                  ├── deploy-and-test (gcp)
#                                                  └── release (non-PR)

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - "image/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/image.yml"
  pull_request:
    paths:
      - "image/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/image.yml"
  workflow_dispatch:

concurrency:
  group: easyenclave-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Shared metadata (sha12, tag, gcp image name) ────────────────────
  meta:
    runs-on: ubuntu-latest
    outputs:
      sha12: ${{ steps.s.outputs.sha12 }}
      tag: ${{ steps.s.outputs.tag }}
      release_name: ${{ steps.s.outputs.release_name }}
      gcp_name: ${{ steps.s.outputs.gcp_name }}
    steps:
      - id: s
        run: |
          SHA12=$(echo "${{ github.sha }}" | cut -c1-12)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            GCP_NAME="easyenclave-${TAG//./-}"
            RELEASE_NAME="easyenclave-${TAG}"
          else
            TAG=""
            GCP_NAME="easyenclave-${SHA12}"
            RELEASE_NAME="easyenclave-${SHA12}"
          fi
          {
            echo "sha12=${SHA12}"
            echo "tag=${TAG}"
            echo "release_name=${RELEASE_NAME}"
            echo "gcp_name=${GCP_NAME}"
          } >> "$GITHUB_OUTPUT"

  # ── Per-target image build ──────────────────────────────────────────
  build:
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [gcp, azure, local-tdx]
    steps:
      - uses: actions/checkout@v4

      - name: Install apt build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            systemd-boot-efi systemd-ukify mtools cryptsetup-bin \
            busybox-static e2fsprogs dosfstools qemu-utils \
            zstd linux-image-generic \
            xorriso squashfs-tools

      - name: Resolve target kernel version
        id: kver
        run: |
          KVER=$(ls -1 /boot/vmlinuz-*-generic 2>/dev/null \
            | sed 's|/boot/vmlinuz-||' | sort -V | tail -1)
          [ -z "$KVER" ] && KVER=$(uname -r)
          echo "kver=$KVER" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mkosi v26
        run: |
          pip install 'git+https://github.com/systemd/mkosi.git@v26' pefile
          sudo ln -sf "$(which mkosi)" /usr/local/bin/mkosi

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build (TARGET=${{ matrix.target }})
        env:
          KVER: ${{ steps.kver.outputs.kver }}
          TARGET: ${{ matrix.target }}
        run: |
          cargo build --release
          cd image && make build KVER="$KVER" TARGET="$TARGET"

      - name: Rename + compute measurements
        env:
          TARGET: ${{ matrix.target }}
          SHA12: ${{ needs.meta.outputs.sha12 }}
        run: |
          cd image/output/${TARGET}
          UKI_SHA256=$(sha256sum easyenclave.efi | cut -d' ' -f1)

          # Common rename: UKI is always produced; rename for release clarity.
          mv easyenclave.efi "easyenclave-${SHA12}-${TARGET}.efi"

          # Per-target format-specific artifacts + hashes. The MEASUREMENTS
          # file is the canonical per-target record: commit, target, UKI
          # hash, and whichever disk/iso hashes the target produces.
          {
            echo "commit: ${{ github.sha }}"
            echo "target: ${TARGET}"
            echo "UKI sha256: ${UKI_SHA256}"
          } > MEASUREMENTS.txt

          if [ -f easyenclave.root.raw ]; then
            RAW_SHA=$(sha256sum easyenclave.root.raw | cut -d' ' -f1)
            mv easyenclave.root.raw "easyenclave-${SHA12}-${TARGET}.raw"
            echo "Disk sha256: ${RAW_SHA}" >> MEASUREMENTS.txt
          fi
          if [ -f easyenclave.qcow2 ]; then
            QCOW_SHA=$(sha256sum easyenclave.qcow2 | cut -d' ' -f1)
            mv easyenclave.qcow2 "easyenclave-${SHA12}-${TARGET}.qcow2"
            echo "Qcow2 sha256: ${QCOW_SHA}" >> MEASUREMENTS.txt
          fi
          if [ -f easyenclave-gcp.tar.gz ]; then
            mv easyenclave-gcp.tar.gz "easyenclave-${SHA12}-gcp.tar.gz"
          fi
          if [ -f easyenclave.vhd ]; then
            VHD_SHA=$(sha256sum easyenclave.vhd | cut -d' ' -f1)
            mv easyenclave.vhd "easyenclave-${SHA12}-${TARGET}.vhd"
            echo "VHD sha256: ${VHD_SHA}" >> MEASUREMENTS.txt
          fi
          if [ -f easyenclave.iso ]; then
            ISO_SHA=$(sha256sum easyenclave.iso | cut -d' ' -f1)
            mv easyenclave.iso "easyenclave-${SHA12}-${TARGET}.iso"
            echo "ISO sha256: ${ISO_SHA}" >> MEASUREMENTS.txt
          fi

          # Keep the unrenamed vmlinuz/initrd/cmdline alongside renamed
          # artifacts — the smoke job expects them at those names.
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: easyenclave-image-${{ matrix.target }}
          path: |
            image/output/${{ matrix.target }}/easyenclave-*
            image/output/${{ matrix.target }}/easyenclave.vmlinuz
            image/output/${{ matrix.target }}/easyenclave.initrd
            image/output/${{ matrix.target }}/easyenclave.cmdline
            image/output/${{ matrix.target }}/MEASUREMENTS.txt
          retention-days: 7

  # ── Non-TDX QEMU smoke test per target ──────────────────────────────
  # Asserts that the full init-pipeline (cmdline parse → root mount →
  # vendor stage → switch_root → Rust PID 1 → attestation detect) runs
  # end-to-end on every target. Expects FATAL at attestation because
  # runners don't have TDX; anything earlier than that is a regression.
  smoke:
    needs: [meta, build]
    # Pin to 24.04 explicitly — 24.04 Actions runners expose /dev/kvm,
    # 22.04 runners don't. Without KVM we fall back to TCG, which boots
    # a 2G/2CPU VM at ~10× real time and can easily blow past any
    # reasonable timeout on ext4/squashfs mount + initrd.
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [gcp, azure, local-tdx]
    steps:
      - uses: actions/checkout@v4

      - name: Install qemu
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86

      - uses: actions/download-artifact@v4
        with:
          name: easyenclave-image-${{ matrix.target }}
          path: image/output/${{ matrix.target }}

      - name: Restore canonical artifact names for smoke boot
        env:
          TARGET: ${{ matrix.target }}
          SHA12: ${{ needs.meta.outputs.sha12 }}
        run: |
          cd image/output/${TARGET}
          # The build job renamed artifacts to include sha12+target for
          # release clarity; the smoke script expects the canonical
          # names the build produces (easyenclave.root.raw, .iso, etc.).
          [ -f "easyenclave-${SHA12}-${TARGET}.raw" ]  && ln -sf "easyenclave-${SHA12}-${TARGET}.raw"  easyenclave.root.raw
          [ -f "easyenclave-${SHA12}-${TARGET}.iso" ]  && ln -sf "easyenclave-${SHA12}-${TARGET}.iso"  easyenclave.iso
          [ -f "easyenclave-${SHA12}-${TARGET}.efi" ]  && ln -sf "easyenclave-${SHA12}-${TARGET}.efi"  easyenclave.efi
          ls -la

      - name: Smoke boot
        env:
          TARGET: ${{ matrix.target }}
          # Belt-and-suspenders: even with KVM, cold-boot across three
          # targets can vary by ±30s depending on runner load. 300s is
          # comfortable without masking real hangs (a hang burns the
          # full budget before failing).
          TIMEOUT_SECS: "300"
        run: |
          bash image/ci-smoke-boot.sh "$TARGET"

  # ── Full real-TDX GCP integration test + image promotion ────────────
  # Unchanged from the pre-matrix workflow, just parameterized to pull
  # the gcp-matrix artifact and use the shared meta outputs.
  deploy-and-test:
    needs: [meta, build]
    if: github.repository == 'easyenclave/easyenclave'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/779946350556/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'easyenclave-github-provisioner@easyenclave.iam.gserviceaccount.com'
      - uses: google-github-actions/setup-gcloud@v2
      - uses: actions/download-artifact@v4
        with:
          name: easyenclave-image-gcp
          path: image/output/gcp

      # ── Create staging image ─────────────────────────────────────
      - name: Create GCP image
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          SHA12: ${{ needs.meta.outputs.sha12 }}
          GCP_NAME: ${{ needs.meta.outputs.gcp_name }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
        run: |
          ASSET="easyenclave-${SHA12}-gcp.tar.gz"
          gcloud storage cp "image/output/gcp/${ASSET}" \
            "gs://${GCS_BUCKET}/${ASSET}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            FAMILY="--family=easyenclave-stable"
            CHANNEL="stable"
          elif [ "$IS_PR" = "true" ]; then
            FAMILY="--family=easyenclave-staging"
            CHANNEL="pr"
          else
            FAMILY="--family=easyenclave-staging"
            CHANNEL="staging"
          fi

          gcloud compute images create "${GCP_NAME}" \
            --project="${GCP_PROJECT}" \
            --source-uri="gs://${GCS_BUCKET}/${ASSET}" \
            ${FAMILY} \
            --guest-os-features=UEFI_COMPATIBLE,TDX_CAPABLE,GVNIC \
            --labels=easyenclave=image,channel=${CHANNEL},commit=${SHA12}
          echo "Created: ${GCP_NAME} (${CHANNEL})"

      # ── Integration test ─────────────────────────────────────────
      - name: Integration test — deploy workload + curl HTTP
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GCP_NAME: ${{ needs.meta.outputs.gcp_name }}
          SHA12: ${{ needs.meta.outputs.sha12 }}
        run: |
          LABEL="${SHA12}"
          # Use '|' as field delimiter so patterns can contain ':'.
          CHECKS=(
            "kernel_boot|Run /init as init process|1"
            "root_resolved|Resolved root to /dev/|1"
            "easyenclave_pid1|easyenclave: running as PID 1|1"
            "vendor_stage|vendor:gcp:|1"
            "metadata_merged|vendor:gcp: merged .* config into|1"
            "tdx_attestation|attestation backend: tdx|1"
            "network_up|Device link is up|1"
            "dhcp_lease|lease of .* obtained|1"
            "listening|easyenclave: listening on|1"
            "deployment_running|deployment .* running|1"
          )

          # Two native workloads: seed an index file, then serve it with
          # busybox httpd. Exercises the plain-command path end-to-end.
          # Deliberately uses the LEGACY JSON format so the JSON-flatten
          # path in vendors/_lib.sh's ee_append_config gets real-boot
          # coverage — the unit test exercises the awk parser in
          # isolation, but end-to-end matters too.
          cat > /tmp/ee-config.json <<'EECONF'
          {
            "EE_OWNER": "integration-test",
            "EE_BOOT_WORKLOADS": "[{\"cmd\":[\"sh\",\"-c\",\"echo ok > /tmp/index.html\"],\"app_name\":\"seed\"},{\"cmd\":[\"busybox\",\"httpd\",\"-f\",\"-p\",\"80\",\"-h\",\"/tmp\"],\"app_name\":\"whoami\"}]"
          }
          EECONF

          gcloud compute firewall-rules describe ee-smoke-allow-http \
            --project="$GCP_PROJECT" >/dev/null 2>&1 || \
          gcloud compute firewall-rules create ee-smoke-allow-http \
            --project="$GCP_PROJECT" --allow=tcp:80 \
            --target-tags=ee-smoke-test --source-ranges=0.0.0.0/0 --quiet

          VM_NAME="ee-test-$(date +%s)"
          gcloud compute instances create "$VM_NAME" \
            --project="$GCP_PROJECT" --zone=us-central1-c \
            --machine-type=c3-standard-4 \
            --confidential-compute-type=TDX --maintenance-policy=TERMINATE \
            --image="${GCP_NAME}" --image-project="$GCP_PROJECT" \
            --boot-disk-size=10GB \
            --metadata-from-file=ee-config=/tmp/ee-config.json \
            --tags=ee-smoke-test

          cleanup() {
            gcloud compute instances delete "$VM_NAME" \
              --project="$GCP_PROJECT" --zone=us-central1-c --quiet || true
          }

          declare -A PASSED
          LAST_LINES=0
          ALL_REQUIRED_DONE=false

          for i in $(seq 1 36); do
            out=$(gcloud compute instances get-serial-port-output "$VM_NAME" \
              --project="$GCP_PROJECT" --zone=us-central1-c 2>/dev/null || true)
            TOTAL_LINES=$(echo "$out" | wc -l)
            if [ "$TOTAL_LINES" -gt "$LAST_LINES" ]; then
              echo "$out" | tail -n +$((LAST_LINES + 1)) | sed 's/^/[serial] /'
              LAST_LINES=$TOTAL_LINES
            fi
            if echo "$out" | grep -qE "FATAL|Kernel panic|switch_root: can|Invalid ELF header"; then
              echo "::error::boot failed — fatal pattern in serial"
              break
            fi
            for check in "${CHECKS[@]}"; do
              IFS="|" read -r name pattern required <<< "$check"
              [ -n "${PASSED[$name]:-}" ] && continue
              echo "$out" | grep -qE "$pattern" && PASSED[$name]=1 && echo "  ✓ $name"
            done
            ALL_REQUIRED_DONE=true
            for check in "${CHECKS[@]}"; do
              IFS="|" read -r name pattern required <<< "$check"
              [ "$required" = "0" ] && continue
              [ -z "${PASSED[$name]:-}" ] && ALL_REQUIRED_DONE=false && break
            done
            $ALL_REQUIRED_DONE && break
            echo "  waiting... (${i}/36)"
            sleep 10
          done

          HTTP_OK=false
          if $ALL_REQUIRED_DONE; then
            VM_IP=$(gcloud compute instances describe "$VM_NAME" \
              --project="$GCP_PROJECT" --zone=us-central1-c \
              --format="value(networkInterfaces[0].accessConfigs[0].natIP)")
            echo ""
            echo "Testing HTTP on $VM_IP:80..."
            for i in $(seq 1 12); do
              code=$(curl -sS -o /dev/null -w '%{http_code}' \
                --connect-timeout 5 "http://$VM_IP:80/" 2>/dev/null || echo 000)
              [ "$code" = "200" ] && echo "  ✓ workload_http ($VM_IP)" && HTTP_OK=true && break
              echo "  waiting... ${code} (${i}/12)"
              sleep 5
            done
          fi

          echo ""
          echo "=== integration test (${LABEL}) ==="
          PASS=0; TOTAL=0
          for check in "${CHECKS[@]}"; do
            IFS="|" read -r name pattern required <<< "$check"
            [ "$required" = "1" ] && TOTAL=$((TOTAL + 1))
            if [ -n "${PASSED[$name]:-}" ]; then
              echo "  ✓ $name"
              [ "$required" = "1" ] && PASS=$((PASS + 1))
            else
              echo "  ✗ $name"
            fi
          done
          TOTAL=$((TOTAL + 1))
          $HTTP_OK && echo "  ✓ workload_http" && PASS=$((PASS + 1)) || echo "  ✗ workload_http"
          echo "${PASS}/${TOTAL} passed"

          if $ALL_REQUIRED_DONE && $HTTP_OK; then
            echo "✓ Integration test passed"
            cleanup; exit 0
          else
            echo "::error::Integration test failed (${PASS}/${TOTAL})"
            echo "$out" | tail -80
            cleanup; exit 1
          fi

      - name: Rotate old images
        if: github.event_name != 'pull_request'
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          for filter in "labels.channel=staging" "labels.channel=pr"; do
            KEEP=$( [ "$filter" = "labels.channel=pr" ] && echo 11 || echo 6 )
            gcloud compute images list --project="${GCP_PROJECT}" \
              --filter="labels.easyenclave=image AND ${filter}" \
              --format="value(name)" --sort-by="~creationTimestamp" \
              | tail -n +${KEEP} \
              | xargs -rI{} gcloud compute images delete {} \
                  --project="${GCP_PROJECT}" --quiet
          done

  # ── Release (non-PR only) ───────────────────────────────────────────
  # Collects per-target artifacts + measurements and attaches everything
  # to a single GitHub release. Gated on matrix build + smoke passing
  # across all targets, plus the real-TDX GCP integration.
  release:
    needs: [meta, build, smoke, deploy-and-test]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-stage
          pattern: easyenclave-image-*

      - name: Stage release assets
        env:
          SHA12: ${{ needs.meta.outputs.sha12 }}
          RELEASE_NAME: ${{ needs.meta.outputs.release_name }}
        run: |
          mkdir -p release-out
          cd release-stage
          for target_dir in easyenclave-image-*; do
            target="${target_dir#easyenclave-image-}"
            # Copy every easyenclave-* artifact as-is; rename MEASUREMENTS
            # to be per-target so they don't collide.
            for f in "${target_dir}"/easyenclave-*; do
              [ -f "$f" ] || continue
              case "$(basename "$f")" in
                *.vmlinuz|*.initrd|*.cmdline) continue ;;  # internal, not released
              esac
              cp "$f" ../release-out/
            done
            if [ -f "${target_dir}/MEASUREMENTS.txt" ]; then
              cp "${target_dir}/MEASUREMENTS.txt" "../release-out/MEASUREMENTS-${target}.txt"
            fi
          done
          cd ..
          ls -la release-out/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          SHA12: ${{ needs.meta.outputs.sha12 }}
          TAG: ${{ needs.meta.outputs.tag }}
          RELEASE_NAME: ${{ needs.meta.outputs.release_name }}
          GCP_NAME: ${{ needs.meta.outputs.gcp_name }}
        run: |
          if [ -n "$TAG" ]; then
            GH_TAG="$TAG"
            PRERELEASE=""
          else
            GH_TAG="image-${SHA12}"
            PRERELEASE="--prerelease"
          fi

          # Build release notes that embed each per-target measurements.
          NOTES_FILE=$(mktemp)
          {
            echo "## Artifacts by target"
            echo ""
            echo "- **gcp** — raw, qcow2, gcp-tar.gz (GCE import)"
            echo "- **azure** — raw, vhd (fixed-size, Azure Managed Disk import)"
            echo "- **local-tdx** — iso (hybrid, OVMF/TDVF boot)"
            echo ""
            echo "GCP image: \`${GCP_NAME}\`"
            echo ""
            for m in release-out/MEASUREMENTS-*.txt; do
              [ -f "$m" ] || continue
              target=$(basename "$m" .txt | sed 's/^MEASUREMENTS-//')
              echo "### MEASUREMENTS (${target})"
              echo ""
              echo '```'
              cat "$m"
              echo '```'
              echo ""
            done
          } > "$NOTES_FILE"

          gh release create "${GH_TAG}" ${PRERELEASE} \
            --title "${GH_TAG}" \
            --notes-file "${NOTES_FILE}" \
            release-out/*
