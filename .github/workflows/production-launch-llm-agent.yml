name: Production Launch LLM Agent

on:
  workflow_dispatch:
    inputs:
      cp_url:
        description: "Control plane URL"
        required: true
        default: "https://app.easyenclave.com"
      size:
        description: "Node size"
        required: true
        default: "llm"
      zone:
        description: "Preferred GCP zone (optional)"
        required: false
        default: ""

jobs:
  launch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ secrets.PRODUCTION_GCP_PROJECT_ID }}
      GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.PRODUCTION_GCP_SERVICE_ACCOUNT_KEY }}
      GCP_ZONE: ${{ vars.PRODUCTION_GCP_ZONE || 'us-central1-a' }}
      EE_GCP_FALLBACK_ZONES: ${{ vars.PRODUCTION_GCP_FALLBACK_ZONES || 'us-central1-b,us-central1-c,us-central1-f' }}
      EE_GCP_IMAGE_FAMILY: easyenclave-agent-main
      EASYENCLAVE_ENV: production
      CP_URL_INPUT: ${{ inputs.cp_url }}
      SIZE_INPUT: ${{ inputs.size }}
      ZONE_INPUT: ${{ inputs.zone }}
      ITA_API_KEY: ${{ secrets.ITA_API_KEY || secrets.INTEL_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Launch production agent VM
        id: launch
        shell: bash
        run: |
          set -euo pipefail
          cp_url="${CP_URL_INPUT:-https://app.easyenclave.com}"
          size="${SIZE_INPUT:-llm}"
          zone="${ZONE_INPUT:-${GCP_ZONE}}"

          case "$size" in
            tiny|standard|llm) ;;
            *)
              echo "::error::Unsupported size '$size' (expected tiny|standard|llm)"
              exit 1
              ;;
          esac

          if [ -z "${ITA_API_KEY:-}" ]; then
            echo "::error::Missing ITA_API_KEY / INTEL_API_KEY secret"
            exit 1
          fi

          AGENT_JSON="$(
            bash crates/ee-ops/assets/gcp-nodectl.sh vm new \
              --size "$size" \
              --cp-url "$cp_url" \
              --ita-api-key "$ITA_API_KEY" \
              --zone "$zone" \
              --wait \
              --timeout 900
          )"

          echo "$AGENT_JSON" | jq .

          name="$(echo "$AGENT_JSON" | jq -r '.name')"
          zone_out="$(echo "$AGENT_JSON" | jq -r '.zone')"
          internal_ip="$(echo "$AGENT_JSON" | jq -r '.internal_ip // \"\"')"
          external_ip="$(echo "$AGENT_JSON" | jq -r '.external_ip // \"\"')"
          node_size="$(echo "$AGENT_JSON" | jq -r '.node_size // \"\"')"
          datacenter="$(echo "$AGENT_JSON" | jq -r '.datacenter // \"\"')"

          {
            echo "name=${name}"
            echo "zone=${zone_out}"
            echo "internal_ip=${internal_ip}"
            echo "external_ip=${external_ip}"
            echo "node_size=${node_size}"
            echo "datacenter=${datacenter}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Production Agent Launch"
            echo ""
            echo "- name: ${name}"
            echo "- zone: ${zone_out}"
            echo "- internal_ip: ${internal_ip}"
            echo "- external_ip: ${external_ip}"
            echo "- node_size: ${node_size}"
            echo "- datacenter: ${datacenter}"
            echo "- cp_url: ${cp_url}"
          } >> "$GITHUB_STEP_SUMMARY"
