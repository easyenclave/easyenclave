# Production Rollout
#
# Canonical production network pipeline:
# 1) Trigger on push to main (merge/direct).
# 2) Wait for CI success on the same commit SHA.
# 3) Require a CI-built production GCP image for that commit.
# 4) Bootstrap production rust control plane and verify agent bootstrap.
#
# Production profile:
# - strict attestation policy
# - billing enabled (simulation enabled for deterministic CI rollouts)
# - commit-pinned control-plane image + commit-pinned GCP boot image

name: Production Rollout

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "infra/**"
      - "crates/ee-ops/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/**"
      - "Dockerfile.ee-cp"
      - "requirements.txt"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      cp_url:
        description: "Production control plane URL"
        required: false
        default: ""
      cp_expected_git_sha:
        description: "Expected git SHA in /health (optional; empty defaults to source SHA)"
        required: false
        default: ""
      source_ref:
        description: "Git ref to checkout for deploy examples"
        required: false
        default: ""
      control_plane_image:
        description: "Control plane image override"
        required: false
        default: ""

concurrency:
  group: easyenclave-production-rollout
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve production rollout config
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      cp_url: ${{ steps.resolve.outputs.cp_url }}
      cp_expected_git_sha: ${{ steps.resolve.outputs.cp_expected_git_sha }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}
      production_domain: ${{ steps.resolve.outputs.production_domain }}
      production_network_name: ${{ steps.resolve.outputs.production_network_name }}
      production_rollout_id: ${{ steps.resolve.outputs.production_rollout_id }}
    steps:
      - name: Resolve URLs and refs
        id: resolve
        shell: bash
        env:
          INPUT_CP_URL: ${{ github.event.inputs.cp_url || '' }}
          INPUT_EXPECTED_SHA: ${{ github.event.inputs.cp_expected_git_sha || '' }}
          INPUT_SOURCE_REF: ${{ github.event.inputs.source_ref || '' }}
          GH_TOKEN: ${{ github.token }}
          DEFAULT_DOMAIN: ${{ vars.PRODUCTION_EASYENCLAVE_DOMAIN || 'easyenclave.com' }}
          DEFAULT_NETWORK_NAME: ${{ vars.PRODUCTION_NETWORK_NAME || '' }}
          DEFAULT_CP_URL: ${{ vars.PRODUCTION_CP_URL || '' }}
          STAGING_DEFAULT_DOMAIN: ${{ vars.STAGING_EASYENCLAVE_DOMAIN || 'easyenclave.com' }}
          STAGING_DEFAULT_CP_URL: ${{ vars.STAGING_CP_URL || '' }}
        run: |
          set -euo pipefail
          make_network_name() {
            local seed="$1"
            local hash adjective_idx noun_idx suffix
            local -a adjectives=(trippy lucid nebula prism velvet cosmic solar ember aurora nova)
            local -a nouns=(voyager horizon drifter comet pulse atlas relay beacon vertex spectrum)
            hash="$(printf '%s' "$seed" | sha256sum | awk '{print $1}')"
            adjective_idx=$((16#${hash:0:2} % ${#adjectives[@]}))
            noun_idx=$((16#${hash:2:2} % ${#nouns[@]}))
            suffix="${hash:4:6}"
            printf '%s-%s-%s' "${adjectives[$adjective_idx]}" "${nouns[$noun_idx]}" "$suffix"
          }

          normalize_network_name() {
            printf '%s' "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g'
          }

          resolve_ref_sha() {
            local ref="$1"
            local sha=""
            if echo "$ref" | grep -Eq '^[0-9a-f]{40}$'; then
              printf '%s' "$ref"
              return 0
            fi
            sha="$(gh api -H "Accept: application/vnd.github+json" "/repos/${GITHUB_REPOSITORY}/commits/${ref}" --jq '.sha' 2>/dev/null || true)"
            if ! echo "${sha:-}" | grep -Eq '^[0-9a-f]{40}$'; then
              return 1
            fi
            printf '%s' "$sha"
          }

          source_ref="${INPUT_SOURCE_REF:-}"
          if [ -z "$source_ref" ]; then
            source_ref="${GITHUB_SHA}"
          fi

          source_sha="$(resolve_ref_sha "$source_ref" || true)"
          if [ -z "${source_sha:-}" ]; then
            echo "::error::Could not resolve source ref '${source_ref}' to a commit SHA."
            exit 1
          fi
          source_ref="$source_sha"

          expected_sha="${INPUT_EXPECTED_SHA:-}"
          if [ -n "$expected_sha" ] && ! echo "$expected_sha" | grep -Eq '^[0-9a-f]{40}$'; then
            expected_sha="$(resolve_ref_sha "$expected_sha" || true)"
          fi
          if [ -z "$expected_sha" ]; then
            expected_sha="$source_sha"
          fi
          if ! echo "$expected_sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::Could not resolve expected git SHA."
            exit 1
          fi

          rollout_seed="${expected_sha:-$source_ref}"
          rollout_seed="$(normalize_network_name "${rollout_seed}")"
          if [ -z "$rollout_seed" ]; then
            rollout_seed="${GITHUB_RUN_ID}"
          fi
          production_rollout_id="main-${rollout_seed:0:20}"

          domain="${DEFAULT_DOMAIN:-easyenclave.com}"
          network_name="$(normalize_network_name "${DEFAULT_NETWORK_NAME:-}")"
          if [ -z "$network_name" ]; then
            network_name="$(make_network_name "production:${source_ref}:${expected_sha}")"
          fi
          network_name="$(normalize_network_name "$network_name")"
          if [ -z "$network_name" ]; then
            echo "::error::Failed to resolve production network name"
            exit 1
          fi
          network_name="${network_name:0:48}"

          cp_url="${INPUT_CP_URL:-}"
          if [ -z "$cp_url" ]; then
            cp_url="${DEFAULT_CP_URL:-}"
          fi
          if [ -z "$cp_url" ]; then
            cp_url="https://app.${domain}"
          fi

          staging_domain="${STAGING_DEFAULT_DOMAIN:-easyenclave.com}"
          staging_cp_url="${STAGING_DEFAULT_CP_URL:-}"
          if [ -z "$staging_cp_url" ]; then
            staging_cp_url="https://app-staging.${staging_domain}"
          fi
          if [ "$cp_url" = "$staging_cp_url" ]; then
            echo "::error::Production and staging CP URLs resolve to the same value: $cp_url"
            echo "::error::Set distinct vars: PRODUCTION_CP_URL/PRODUCTION_EASYENCLAVE_DOMAIN and STAGING_CP_URL/STAGING_EASYENCLAVE_DOMAIN."
            exit 1
          fi
          echo "::notice::Resolved production network name: ${network_name}"

          {
            echo "source_ref=${source_ref}"
            echo "source_sha=${source_sha}"
            echo "cp_expected_git_sha=${expected_sha}"
            echo "production_domain=${domain}"
            echo "production_network_name=${network_name}"
            echo "production_rollout_id=${production_rollout_id}"
            echo "cp_url=${cp_url}"
          } >> "$GITHUB_OUTPUT"

  wait-ci:
    name: Wait for CI on target SHA
    needs: [resolve]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Require CI success for rollout SHA
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ needs.resolve.outputs.cp_expected_git_sha }}
        run: |
          set -euo pipefail
          if [ -z "${TARGET_SHA:-}" ]; then
            echo "::error::Missing target SHA for CI gate."
            exit 1
          fi

          deadline=$(( $(date +%s) + 3600 ))
          while :; do
            runs="$(gh api -H "Accept: application/vnd.github+json" "/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${TARGET_SHA}&per_page=100")"
            status="$(echo "$runs" | jq -r '[.workflow_runs[] | select(.name == "CI")] | sort_by(.created_at) | last | .status // "missing"')"
            conclusion="$(echo "$runs" | jq -r '[.workflow_runs[] | select(.name == "CI")] | sort_by(.created_at) | last | .conclusion // ""')"
            url="$(echo "$runs" | jq -r '[.workflow_runs[] | select(.name == "CI")] | sort_by(.created_at) | last | .html_url // ""')"
            echo "CI gate: sha=${TARGET_SHA} status=${status} conclusion=${conclusion}"
            if [ -n "$url" ]; then
              echo "  ${url}"
            fi

            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                echo "CI passed for ${TARGET_SHA}."
                break
              fi
              echo "::error::CI for ${TARGET_SHA} completed with conclusion='${conclusion}'."
              exit 1
            fi

            now=$(date +%s)
            if [ "$now" -ge "$deadline" ]; then
              echo "::error::Timed out waiting for CI success for ${TARGET_SHA}."
              exit 1
            fi
            sleep 15
          done

  verify-production-gcp-image:
    name: Verify CI-built production GCP image exists
    needs: [resolve, wait-ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_project: ${{ steps.image.outputs.image_project }}
      image_name: ${{ steps.image.outputs.image_name }}
      image_family: ${{ steps.image.outputs.image_family }}
    env:
      GCP_PROJECT_ID: ${{ secrets.PRODUCTION_GCP_PROJECT_ID }}
      GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.PRODUCTION_GCP_SERVICE_ACCOUNT_KEY }}
      SOURCE_SHA: ${{ needs.resolve.outputs.source_sha }}
    steps:
      - name: Validate production GCP config
        shell: bash
        run: |
          set -euo pipefail
          for v in GCP_PROJECT_ID GCP_SERVICE_ACCOUNT_KEY SOURCE_SHA; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Missing required value: $v"
              exit 1
            fi
          done

      - name: Authenticate to GCP (production)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud (production)
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Require CI-built production image for rollout commit
        id: image
        shell: bash
        run: |
          set -euo pipefail
          sha12="$(echo "${SOURCE_SHA}" | cut -c1-12)"
          image_name="easyenclave-agent-main-${sha12}"
          image_family="easyenclave-agent-main"
          if ! gcloud compute images describe "${image_name}" --project "${GCP_PROJECT_ID}" >/dev/null 2>&1; then
            echo "::error::Missing CI-built production image '${GCP_PROJECT_ID}/${image_name}'."
            echo "::error::CI must create this image before production rollout can run."
            exit 1
          fi
          echo "Found CI-built production image: ${GCP_PROJECT_ID}/${image_name}"
          {
            echo "image_project=${GCP_PROJECT_ID}"
            echo "image_name=${image_name}"
            echo "image_family=${image_family}"
          } >> "$GITHUB_OUTPUT"

  bootstrap:
    name: Bootstrap production control plane
    needs: [resolve, wait-ci, verify-production-gcp-image]
    uses: ./.github/workflows/bootstrap-control-plane.yml
    secrets: inherit
    with:
      source_ref: ${{ needs.resolve.outputs.source_sha }}
      control_plane_image: ${{ github.event.inputs.control_plane_image || format('ghcr.io/{0}/control-plane-rust:{1}', github.repository, needs.resolve.outputs.source_sha) }}
      cp_bootstrap_sizes: tiny,llm
      # Keep at least one warm tiny agent so production cannot come up with zero
      # deployable capacity when builtin example jobs are skipped.
      num_tiny_agents: '1'
      num_standard_agents: '0'
      num_llm_agents: '1'
      easyenclave_domain: ${{ needs.resolve.outputs.production_domain }}
      easyenclave_network_name: ${{ needs.resolve.outputs.production_network_name }}
      easyenclave_env: production
      easyenclave_release_tag: ${{ needs.resolve.outputs.production_rollout_id }}
      tcb_enforcement_mode: strict
      # GCP TDX hosts can temporarily report OutOfDate while still providing valid quotes.
      # Keep strict enforcement but include both statuses for deterministic production GCP bring-up.
      allowed_tcb_statuses: UpToDate,OutOfDate
      # Launcher retries can miss nonce state and fail closed on registration.
      # Keep rollout functional until nonce retry semantics are unified end-to-end.
      nonce_enforcement_mode: optional
      nonce_ttl_seconds: '300'
      # Runtime RTMR values can drift during bootstrap; keep rollout deterministic
      # while strict MRTD/TCB/nonce/signature checks are enforced.
      rtmr_enforcement_mode: warn
      signature_verification_mode: strict
      # CI control-plane hosts currently cannot always mint CP quote envelopes.
      # Keep rollout/deploy deterministic while CP quote support is stabilized.
      cp_to_agent_attestation_mode: optional
      auth_require_github_oauth_in_production: ${{ 'true' }}
      password_login_enabled: ${{ 'true' }}
      # Required so CI can admin-login and trust-bootstrap newly observed GCP MRTDs.
      auth_allow_password_login_in_production: ${{ 'true' }}
      billing_enabled: ${{ 'true' }}
      # CI rollouts use simulated billing capacity requests to avoid external account funding dependence.
      billing_capacity_request_dev_simulation: ${{ 'true' }}
      billing_platform_account_id: ${{ vars.BILLING_PLATFORM_ACCOUNT_ID || '' }}
      billing_contributor_pool_bps: ${{ vars.BILLING_CONTRIBUTOR_POOL_BPS || '5000' }}
      use_precomputed_trusted_values: ${{ 'false' }}
      cosign_certificate_oidc_issuer: https://token.actions.githubusercontent.com
      cosign_certificate_identity_regexp: ${{ format('^https://github.com/{0}/.github/workflows/.+@refs/heads/main$', github.repository) }}
      ee_gcp_image_project: ${{ needs.verify-production-gcp-image.outputs.image_project }}
      ee_gcp_image_name: ${{ needs.verify-production-gcp-image.outputs.image_name }}
      ee_gcp_image_family: ${{ needs.verify-production-gcp-image.outputs.image_family }}

  verify-rust-cp-agents:
    name: Verify rust CP + agent bootstrap
    needs: [resolve, bootstrap]
    runs-on: ubuntu-latest
    env:
      CP_URL: ${{ needs.bootstrap.outputs.cp_public_url || needs.resolve.outputs.cp_url }}
      CP_EXPECTED_GIT_SHA: ${{ needs.resolve.outputs.cp_expected_git_sha }}
      CP_EXPECTED_BOOT_ID: ${{ format('bootstrap-{0}-{1}', github.run_id, github.run_attempt) }}
      MIN_VERIFIED_AGENTS: "1"
    steps:
      - name: Wait for rust control plane health identity
        shell: bash
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 900 ))
          while :; do
            body="$(curl -fsS "$CP_URL/health" 2>/dev/null || true)"
            if [ -z "${body:-}" ]; then
              now="$(date +%s)"
              if [ "$now" -ge "$deadline" ]; then
                echo "::error::Timed out waiting for rust control plane health."
                exit 1
              fi
              sleep 5
              continue
            fi
            sha="$(echo "$body" | jq -r '.git_sha // empty' 2>/dev/null || true)"
            boot_id="$(echo "$body" | jq -r '.boot_id // empty' 2>/dev/null || true)"
            ok="$(echo "$body" | jq -r '.ok // false' 2>/dev/null || echo false)"
            if [ "$ok" != "true" ]; then
              sleep 5
              continue
            fi
            if [ -n "${CP_EXPECTED_GIT_SHA:-}" ] && [ "${sha:-}" != "${CP_EXPECTED_GIT_SHA}" ]; then
              sleep 5
              continue
            fi
            if [ -n "${CP_EXPECTED_BOOT_ID:-}" ] && [ "${boot_id:-}" != "${CP_EXPECTED_BOOT_ID}" ]; then
              sleep 5
              continue
            fi
            echo "Rust control plane ready: git_sha=${sha:-unknown} boot_id=${boot_id:-unknown}"
            break
          done

      - name: Wait for verified rust agents
        shell: bash
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 900 ))
          while :; do
            body="$(curl -fsS "$CP_URL/api/v1/agents" 2>/dev/null || true)"
            if [ -z "${body:-}" ]; then
              sleep 5
              continue
            fi
            verified="$(echo "$body" | jq -r '(if type == "array" then . else (.agents // []) end) | [ .[] | select(.verified == true) ] | length' 2>/dev/null || echo 0)"
            total="$(echo "$body" | jq -r '(if type == "array" then . else (.agents // []) end) | length' 2>/dev/null || echo 0)"
            echo "Rust agent bootstrap status: verified=${verified} total=${total}"
            if [ "${verified:-0}" -ge "${MIN_VERIFIED_AGENTS}" ]; then
              break
            fi
            now="$(date +%s)"
            if [ "$now" -ge "$deadline" ]; then
              echo "::error::Timed out waiting for verified rust agents. expected>=${MIN_VERIFIED_AGENTS} verified=${verified} total=${total}"
              echo "$body" | jq -r '(if type == "array" then . else (.agents // []) end)' || true
              exit 1
            fi
            sleep 5
          done

  assert-rollout-executed:
    name: Assert production rollout executed
    needs: [resolve, verify-production-gcp-image, bootstrap, verify-rust-cp-agents]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any rollout stage was skipped/failed
        shell: bash
        run: |
          set -euo pipefail
          gcp_image="${{ needs['verify-production-gcp-image'].result }}"
          bootstrap="${{ needs.bootstrap.result }}"
          rust_verify="${{ needs['verify-rust-cp-agents'].result }}"
          echo "gcp_image=${gcp_image} bootstrap=${bootstrap} rust_verify=${rust_verify}"
          if [ "$gcp_image" != "success" ] || [ "$bootstrap" != "success" ] || [ "$rust_verify" != "success" ]; then
            echo "::error::Rust production rollout did not fully execute: gcp_image=${gcp_image}, bootstrap=${bootstrap}, rust_verify=${rust_verify}"
            exit 1
          fi
          echo "Rust production rollout executed all required stages."
