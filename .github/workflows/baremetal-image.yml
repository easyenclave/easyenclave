name: Baremetal Image

on:
  workflow_dispatch:
    inputs:
      target_image_name:
        description: "Output image name suffix/folder"
        required: false
        type: string
      base_image_url:
        description: "Ubuntu cloud image URL"
        required: false
        default: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
        type: string
      export_raw:
        description: "Export raw disk alongside qcow2"
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: [self-hosted, tdx-worker]
    permissions:
      contents: read
    env:
      SOURCE_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Packer
        uses: hashicorp/setup-packer@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Ansible
        shell: bash
        run: |
          set -euo pipefail
          if command -v ansible-playbook >/dev/null 2>&1; then
            exit 0
          fi
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ansible
          else
            python3 -m pip install --user ansible
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Build bare-metal image
        shell: bash
        env:
          ANSIBLE_CONFIG: ansible/ansible.cfg
        run: |
          set -euo pipefail
          target_name="${{ inputs.target_image_name }}"
          if [ -z "${target_name}" ]; then
            target_name="easyenclave-baremetal-$(echo "${SOURCE_SHA}" | cut -c1-12)"
          fi

          ansible-playbook ansible/playbooks/baremetal-image-bake.yml \
            -e "target_image_name=${target_name}" \
            -e "source_sha=${SOURCE_SHA}" \
            -e "base_image_url=${{ inputs.base_image_url }}" \
            -e "export_raw=${{ inputs.export_raw }}"

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: baremetal-image-${{ github.run_id }}
          path: artifacts/baremetal-images
          if-no-files-found: warn
