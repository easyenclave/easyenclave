name: Baremetal Image

on:
  workflow_dispatch:
    inputs:
      target_image_name:
        description: "Output image name suffix/folder"
        required: false
        type: string
      base_image_url:
        description: "Ubuntu cloud image URL"
        required: false
        default: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
        type: string
      export_raw:
        description: "Export raw disk alongside qcow2"
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: [self-hosted, tdx-worker]
    permissions:
      contents: read
    env:
      SOURCE_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Packer
        uses: hashicorp/setup-packer@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build bare-metal image
        shell: bash
        run: |
          set -euo pipefail
          target_name="${{ inputs.target_image_name }}"
          if [ -z "${target_name}" ]; then
            target_name="easyenclave-baremetal-$(echo "${SOURCE_SHA}" | cut -c1-12)"
          fi

          export TARGET_IMAGE_NAME="${target_name}"
          export BAREMETAL_BASE_IMAGE_URL="${{ inputs.base_image_url }}"
          export BAREMETAL_EXPORT_RAW="${{ inputs.export_raw }}"
          cargo run -p ee-ops -- baremetal-bake-image

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: baremetal-image-${{ github.run_id }}
          path: artifacts/baremetal-images
          if-no-files-found: warn
