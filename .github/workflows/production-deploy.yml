name: Production Deploy

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "infra/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/**"
      - "Dockerfile.ee-cp"
  workflow_dispatch:

concurrency:
  group: easyenclave-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      SOURCE_SHA: ${{ github.sha }}
      GCP_PROJECT_ID: ${{ secrets.PRODUCTION_GCP_PROJECT_ID }}
      GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.PRODUCTION_GCP_SERVICE_ACCOUNT_KEY }}
      GCP_ZONE: ${{ vars.PRODUCTION_GCP_ZONE || 'us-central1-a' }}
      EE_GCP_FALLBACK_ZONES: ${{ vars.PRODUCTION_GCP_FALLBACK_ZONES || 'us-central1-b,us-central1-c,us-central1-f' }}
      BUILD_ZONE: ${{ vars.PRODUCTION_GCP_IMAGE_BUILD_ZONE || 'us-central1-a' }}
      BUILD_FALLBACK_ZONES: ${{ vars.PRODUCTION_GCP_IMAGE_BUILD_FALLBACK_ZONES || 'us-central1-b,us-central1-c,us-central1-f' }}
      BUILD_MACHINE_TYPE: ${{ vars.PRODUCTION_GCP_IMAGE_BUILD_MACHINE_TYPE || 'e2-standard-4' }}
      EASYENCLAVE_DOMAIN: ${{ vars.PRODUCTION_EASYENCLAVE_DOMAIN || 'easyenclave.com' }}
      PRODUCTION_CP_URL: ${{ vars.PRODUCTION_CP_URL || format('https://app.{0}', vars.PRODUCTION_EASYENCLAVE_DOMAIN || 'easyenclave.com') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint + test
        run: |
          cargo fmt --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      - name: Resolve rollout vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          sha12="$(echo "${SOURCE_SHA}" | cut -c1-12)"
          {
            echo "sha12=${sha12}"
            echo "network_name=production"
            echo "release_tag=prod-${sha12}"
          } >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Build and push control plane image
        id: cp_image
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY}/control-plane-rust:${SOURCE_SHA}"
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build -f Dockerfile.ee-cp -t "${image}" .
          docker push "${image}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Bake production GCP image for commit
        shell: bash
        env:
          SOURCE_IMAGE_PROJECT: ubuntu-os-cloud
          SOURCE_IMAGE_FAMILY: ubuntu-2404-lts-amd64
        run: |
          set -euo pipefail
          export TARGET_IMAGE_NAME="easyenclave-agent-main-${{ steps.vars.outputs.sha12 }}"
          export TARGET_IMAGE_FAMILY="easyenclave-agent-main"
          export TARGET_IMAGE_DESCRIPTION="EasyEnclave production commit ${SOURCE_SHA}"
          export TARGET_IMAGE_LABELS="easyenclave=managed,easyenclave_env=production,gitsha=${{ steps.vars.outputs.sha12 }}"
          cargo run -p ee-ops -- gcp-bake-image

      - name: Measure trusted values
        id: measure
        env:
          MEASURE_SIZES: tiny
          MEASURE_ATTEMPTS: "2"
        run: cargo run -p ee-ops -- ci-build-measure

      - name: Deploy production control plane and agent
        id: deploy
        shell: bash
        env:
          AGENT_DATACENTER_AZ: ${{ env.GCP_ZONE }}
          ADMIN_PASSWORD: ${{ secrets.CP_ADMIN_PASSWORD }}
          ADMIN_GITHUB_LOGINS: ${{ secrets.ADMIN_GITHUB_LOGINS }}
          ITA_API_KEY: ${{ secrets.ITA_API_KEY || secrets.INTEL_API_KEY }}
          EE_AGENT_ITA_API_KEY: ${{ secrets.ITA_API_KEY || secrets.INTEL_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          EASYENCLAVE_ENV: production
          EASYENCLAVE_NETWORK_NAME: ${{ steps.vars.outputs.network_name }}
          EASYENCLAVE_RELEASE_TAG: ${{ steps.vars.outputs.release_tag }}
          EASYENCLAVE_GIT_SHA: ${{ env.SOURCE_SHA }}
          CONTROL_PLANE_IMAGE: ${{ steps.cp_image.outputs.image }}
          NUM_TINY_AGENTS: "1"
          NUM_STANDARD_AGENTS: "0"
          NUM_LLM_AGENTS: "0"
          TRUSTED_AGENT_MRTDS: ${{ steps.measure.outputs.mrtds }}
          TRUSTED_AGENT_MRTDS_BY_SIZE: ${{ steps.measure.outputs.mrtds_by_size }}
          TRUSTED_AGENT_RTMRS: ${{ steps.measure.outputs.rtmrs }}
          TRUSTED_AGENT_RTMRS_BY_SIZE: ${{ steps.measure.outputs.rtmrs_by_size }}
          TCB_ENFORCEMENT_MODE: strict
          ALLOWED_TCB_STATUSES: UpToDate,OutOfDate
          NONCE_ENFORCEMENT_MODE: optional
          RTMR_ENFORCEMENT_MODE: warn
          SIGNATURE_VERIFICATION_MODE: strict
          CP_TO_AGENT_ATTESTATION_MODE: optional
          AUTH_REQUIRE_GITHUB_OAUTH_IN_PRODUCTION: "true"
          PASSWORD_LOGIN_ENABLED: "true"
          AUTH_ALLOW_PASSWORD_LOGIN_IN_PRODUCTION: "true"
          BILLING_ENABLED: "false"
          BILLING_CAPACITY_REQUEST_DEV_SIMULATION: "false"
          GITHUB_OAUTH_CLIENT_ID: ${{ secrets.EE_GITHUB_OAUTH_CLIENT_ID }}
          GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.EE_GITHUB_OAUTH_CLIENT_SECRET }}
          GITHUB_OAUTH_REDIRECT_URI: ${{ secrets.EE_GITHUB_OAUTH_REDIRECT_URI || format('https://app.{0}/auth/github/callback', env.EASYENCLAVE_DOMAIN) }}
          EE_GCP_IMAGE_FAMILY: easyenclave-agent-main
          CI_DEPLOY_TIMEOUT_SECONDS: "1500"
          CP_BOOTSTRAP_TIMEOUT: "600"
          AGENT_VERIFY_WAIT_ATTEMPTS: "60"
          AGENT_VERIFY_WAIT_SECONDS: "5"
        run: |
          set -euo pipefail
          timeout 1600 cargo run -p ee-ops -- ci-deploy 2>&1 | tee /tmp/ci-deploy.log

      - name: Smoke check production (internal)
        shell: bash
        env:
          CP_INTERNAL_URL: ${{ steps.deploy.outputs.cp_internal_url }}
        run: |
          set -euo pipefail
          if [ -z "${CP_INTERNAL_URL:-}" ]; then
            echo "::error::Missing cp_internal_url from deploy step"
            exit 1
          fi
          curl -fsS "${CP_INTERNAL_URL}/health" | jq .
          body="$(curl -fsS "${CP_INTERNAL_URL}/api/agents" || curl -fsS "${CP_INTERNAL_URL}/api/v1/agents")"
          verified="$(echo "$body" | jq -r '(if type=="array" then . else (.agents // []) end) | [ .[] | select(.verified==true) ] | length')"
          echo "verified_agents=${verified}"
          test "${verified}" -ge 1

      - name: Smoke check production (public URL)
        shell: bash
        run: |
          set -euo pipefail
          ok=0
          for _ in $(seq 1 36); do
            if curl -fsS "${PRODUCTION_CP_URL}/health" >/tmp/production-health.json 2>/tmp/production-health.err; then
              ok=1
              break
            fi
            sleep 5
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::Public production health check failed for ${PRODUCTION_CP_URL}/health"
            cat /tmp/production-health.err || true
            exit 1
          fi
          jq . < /tmp/production-health.json

      - name: Dump GCP serial logs on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          gcloud compute instances list --project "${GCP_PROJECT_ID}" \
            --filter "labels.easyenclave=managed AND labels.ee_env=production" \
            --format "value(name,zone)" > /tmp/production_instances.txt || true
          while read -r name zone; do
            [ -n "${name:-}" ] || continue
            [ -n "${zone:-}" ] || continue
            zone_short="${zone##*/}"
            echo "===== ${name} (${zone_short}) ====="
            gcloud compute instances get-serial-port-output "${name}" \
              --project "${GCP_PROJECT_ID}" \
              --zone "${zone_short}" \
              --port 1 | tail -n 200 || true
          done < /tmp/production_instances.txt

      - name: Upload deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy-log-${{ github.run_id }}
          path: /tmp/ci-deploy.log
          if-no-files-found: ignore
