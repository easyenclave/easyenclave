name: Deploy Examples

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Deployment profile"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      cp_url:
        description: "Override control-plane URL (optional)"
        required: false
        type: string
      model:
        description: "Override Ollama model tag (optional)"
        required: false
        type: string
      node_size:
        description: "Override node size (optional)"
        required: false
        type: choice
        options:
          - ""
          - tiny
          - standard
          - llm
      dry_run:
        description: "Submit deploy as dry-run"
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  deploy-private-llm:
    runs-on: ubuntu-latest
    env:
      OIDC_AUDIENCE: easyenclave
      DEFAULT_STAGING_CP_URL: ${{ vars.STAGING_CP_URL || format('https://app-staging.{0}', vars.STAGING_EASYENCLAVE_DOMAIN || 'easyenclave.com') }}
      DEFAULT_PRODUCTION_CP_URL: ${{ vars.PRODUCTION_CP_URL || format('https://app.{0}', vars.PRODUCTION_EASYENCLAVE_DOMAIN || 'easyenclave.com') }}
      STAGING_DEPLOYER_API_KEY: ${{ secrets.STAGING_DEPLOYER_API_KEY }}
      PRODUCTION_DEPLOYER_API_KEY: ${{ secrets.PRODUCTION_DEPLOYER_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy profile
        id: cfg
        shell: bash
        env:
          TARGET_ENV: ${{ inputs.target_env }}
          INPUT_CP_URL: ${{ inputs.cp_url }}
          INPUT_MODEL: ${{ inputs.model }}
          INPUT_NODE_SIZE: ${{ inputs.node_size }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          target_env="${TARGET_ENV}"

          if [ -n "${INPUT_CP_URL}" ]; then
            cp_url="${INPUT_CP_URL}"
          elif [ "${target_env}" = "production" ]; then
            cp_url="${DEFAULT_PRODUCTION_CP_URL}"
          else
            cp_url="${DEFAULT_STAGING_CP_URL}"
          fi

          if [ "${target_env}" = "production" ]; then
            compose_file="examples/private-llm/docker-compose.h100.yml"
            default_model="qwen2.5:32b"
            default_node_size="llm"
          else
            compose_file="examples/private-llm/docker-compose.yml"
            default_model="smollm2:135m"
            default_node_size="tiny"
          fi

          model="${INPUT_MODEL:-${default_model}}"
          node_size="${INPUT_NODE_SIZE:-${default_node_size}}"
          dry_run="false"
          if [ "${INPUT_DRY_RUN}" = "true" ]; then
            dry_run="true"
          fi

          {
            echo "cp_url=${cp_url}"
            echo "compose_file=${compose_file}"
            echo "model=${model}"
            echo "node_size=${node_size}"
            echo "target_env=${target_env}"
            echo "dry_run=${dry_run}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve auth token (API key or GitHub OIDC)
        id: auth
        shell: bash
        env:
          TARGET_ENV: ${{ steps.cfg.outputs.target_env }}
        run: |
          set -euo pipefail

          api_key=""
          if [ "${TARGET_ENV}" = "production" ]; then
            api_key="${PRODUCTION_DEPLOYER_API_KEY:-}"
          else
            api_key="${STAGING_DEPLOYER_API_KEY:-}"
          fi

          if [ -n "${api_key}" ]; then
            echo "token=${api_key}" >> "$GITHUB_OUTPUT"
            echo "auth_mode=api_key" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          oidc_token="$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${OIDC_AUDIENCE}" | jq -r '.value')"
          if [ -z "${oidc_token}" ] || [ "${oidc_token}" = "null" ]; then
            echo "::error::Failed to mint GitHub OIDC token and no deployer API key secret is configured"
            exit 1
          fi

          echo "token=${oidc_token}" >> "$GITHUB_OUTPUT"
          echo "auth_mode=github_oidc" >> "$GITHUB_OUTPUT"

      - name: Submit private-llm deployment
        id: deploy
        shell: bash
        env:
          CP_URL: ${{ steps.cfg.outputs.cp_url }}
          COMPOSE_FILE: ${{ steps.cfg.outputs.compose_file }}
          MODEL: ${{ steps.cfg.outputs.model }}
          NODE_SIZE: ${{ steps.cfg.outputs.node_size }}
          DRY_RUN: ${{ steps.cfg.outputs.dry_run }}
          AUTH_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail

          compose="$(cat "${COMPOSE_FILE}")"
          compose="${compose//\$\{OLLAMA_MODEL:-smollm2:135m\}/${MODEL}}"
          compose="${compose//\$\{OLLAMA_MODEL:-qwen2.5:32b\}/${MODEL}}"

          payload="$(jq -n \
            --arg compose "${compose}" \
            --arg app_name "private-llm" \
            --arg node_size "${NODE_SIZE}" \
            --arg dry_run "${DRY_RUN}" \
            '{compose: $compose, app_name: $app_name, node_size: $node_size, dry_run: ($dry_run == "true")}')"

          response="$(curl -sS -X POST "${CP_URL}/api/deploy" \
            -H "Authorization: Bearer ${AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${payload}")"

          echo "${response}" | jq .

          deployment_id="$(echo "${response}" | jq -r '.deployment_id // empty')"
          agent_id="$(echo "${response}" | jq -r '.agent_id // empty')"

          if [ -z "${deployment_id}" ] || [ -z "${agent_id}" ]; then
            echo "::error::Deployment failed"
            exit 1
          fi

          echo "deployment_id=${deployment_id}" >> "$GITHUB_OUTPUT"
          echo "agent_id=${agent_id}" >> "$GITHUB_OUTPUT"

      - name: Print resulting agent endpoint
        shell: bash
        env:
          CP_URL: ${{ steps.cfg.outputs.cp_url }}
          AGENT_ID: ${{ steps.deploy.outputs.agent_id }}
        run: |
          set -euo pipefail
          agent_json="$(curl -sS "${CP_URL}/api/agents/${AGENT_ID}")"
          echo "${agent_json}" | jq .
          hostname="$(echo "${agent_json}" | jq -r '.hostname // empty')"
          if [ -n "${hostname}" ]; then
            echo "private-llm endpoint: https://${hostname}"
          fi

      - name: Summary
        shell: bash
        run: |
          echo "Submitted deployment_id=${{ steps.deploy.outputs.deployment_id }} agent_id=${{ steps.deploy.outputs.agent_id }}"
          echo "Auth mode: ${{ steps.auth.outputs.auth_mode }}"
          echo "Profile: ${{ steps.cfg.outputs.target_env }} model=${{ steps.cfg.outputs.model }} node_size=${{ steps.cfg.outputs.node_size }} dry_run=${{ steps.cfg.outputs.dry_run }}"
