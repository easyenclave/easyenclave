---
- name: Resolve machine profile for launch size
  ansible.builtin.set_fact:
    current_size: "{{ launch_size | lower }}"
    current_profile: "{{ size_profiles[launch_size | lower] }}"

- name: Validate launch size profile exists
  ansible.builtin.assert:
    that:
      - current_profile is mapping
    fail_msg: "Unsupported size '{{ launch_size }}'"

- name: Compute per-VM launch values
  ansible.builtin.set_fact:
    node_size_label: "{{ (current_size | lower | regex_replace('[^a-z0-9-]+', '-') | regex_replace('-+', '-') | regex_replace('^-+', '') | regex_replace('-+$', '')) or 'tiny' }}"
    vm_name: "{{ ((('tdx-agent-' ~ lookup('pipe', 'cat /proc/sys/kernel/random/uuid | tr -d - | cut -c1-10')) | lower | regex_replace('[^a-z0-9-]+', '-') | regex_replace('-+', '-') | regex_replace('^-+', '') | regex_replace('-+$', '')) | truncate(63, true, '')) or ('tdx-agent-' ~ lookup('pipe', 'date +%s')) }}"
    datacenter_label: "{{ (agent_datacenter if (agent_datacenter | length > 0) else ('gcp:' ~ resolved_zone)) }}"
    boot_disk_gib: "{{ [current_profile.disk_gib | int, source_image_disk_gib | int] | max }}"

- name: Build agent config payload
  ansible.builtin.set_fact:
    agent_config_all:
      control_plane_url: "{{ cp_url }}"
      cloud_provider: gcp
      availability_zone: "{{ resolved_zone }}"
      region: "{{ resolved_region }}"
      datacenter: "{{ datacenter_label }}"
      node_size: "{{ current_size }}"
      intel_api_key: "{{ ita_api_key }}"
      ita_api_key: "{{ ita_api_key }}"
      easyenclave_env: "{{ resolved_env_name }}"
      easyenclave_network_name: "{{ resolved_network_name }}"

- name: Remove empty values from agent config
  ansible.builtin.set_fact:
    agent_config: "{{ agent_config_all | dict2items | rejectattr('value', 'equalto', '') | rejectattr('value', 'equalto', none) | items2dict }}"

- name: Allocate startup script file
  ansible.builtin.tempfile:
    state: file
    suffix: .sh
  register: startup_script_file

- name: Render agent startup script
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/agent-startup.sh.j2"
    dest: "{{ startup_script_file.path }}"
    mode: "0755"
  vars:
    agent_config_json: "{{ agent_config | to_nice_json }}"

- name: Create agent VM
  ansible.builtin.command:
    argv:
      - gcloud
      - compute
      - instances
      - create
      - "{{ vm_name }}"
      - --project
      - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
      - --zone
      - "{{ resolved_zone }}"
      - --machine-type
      - "{{ current_profile.machine_type }}"
      - --boot-disk-size
      - "{{ boot_disk_gib }}GB"
      - --boot-disk-type
      - pd-balanced
      - --maintenance-policy
      - TERMINATE
      - --provisioning-model
      - STANDARD
      - --confidential-compute-type
      - TDX
      - --labels
      - "easyenclave=managed,ee_role=agent,ee_env={{ env_label }},ee_network={{ network_label }},ee_node_size={{ node_size_label }}"
      - --metadata
      - serial-port-enable=1,enable-oslogin=FALSE
      - --metadata-from-file
      - "startup-script={{ startup_script_file.path }}"
      - --scopes
      - https://www.googleapis.com/auth/cloud-platform
      - --image-project
      - "{{ source_image_project }}"
      - --image
      - "{{ source_image_name }}"
  register: vm_create_cmd

- name: Wait for VM status RUNNING
  ansible.builtin.command:
    argv:
      - gcloud
      - compute
      - instances
      - describe
      - "{{ vm_name }}"
      - --project
      - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
      - --zone
      - "{{ resolved_zone }}"
      - --format
      - value(status)
  register: vm_status_cmd
  changed_when: false
  retries: "{{ [1, ((vm_timeout_seconds | int + 2) // 3)] | max }}"
  delay: 3
  until: (vm_status_cmd.stdout | trim | upper) == 'RUNNING'
  when: vm_wait | bool

- name: Read VM metadata
  ansible.builtin.command:
    argv:
      - gcloud
      - compute
      - instances
      - describe
      - "{{ vm_name }}"
      - --project
      - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
      - --zone
      - "{{ resolved_zone }}"
      - --format
      - json
  register: vm_json_cmd
  changed_when: false

- name: Parse VM metadata JSON
  ansible.builtin.set_fact:
    vm_meta: "{{ vm_json_cmd.stdout | from_json }}"

- name: Append launched VM record
  ansible.builtin.set_fact:
    launched_vms: "{{ (launched_vms | default([])) + [ {
      'name': vm_name,
      'zone': resolved_zone,
      'internal_ip': ((vm_meta.networkInterfaces | default([]) | first | default({})).networkIP | default('')),
      'external_ip': (((vm_meta.networkInterfaces | default([]) | first | default({})).accessConfigs | default([]) | first | default({})).natIP | default('')),
      'cloud_provider': 'gcp',
      'datacenter': datacenter_label,
      'node_size': current_size
      } ] }}"

- name: Remove startup script file
  ansible.builtin.file:
    path: "{{ startup_script_file.path }}"
    state: absent
  when: startup_script_file.path is defined
