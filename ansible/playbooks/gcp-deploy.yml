---
- name: Deploy control plane and agent fleet on GCP
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    cp_port: 8080
    cp_bootstrap_timeout: 600
    num_tiny_agents: 1
    num_standard_agents: 0
    num_llm_agents: 0
    orchestration_provider: gcp
    agent_datacenter: ""
    agent_datacenter_az: us-central1-f
    agent_datacenter_region: ""
    agent_verify_wait_attempts: 90
    agent_verify_wait_seconds: 10
    output_json_path: /tmp/ee-ci-deploy.json
    ansible_config_path: "{{ lookup('env', 'ANSIBLE_CONFIG') | default('ansible/ansible.cfg', true) }}"
    ita_api_key: "{{ lookup('env', 'ITA_API_KEY') | default(lookup('env', 'INTEL_API_KEY'), true) }}"
    admin_password: "{{ lookup('env', 'ADMIN_PASSWORD') | default(lookup('env', 'CP_ADMIN_PASSWORD'), true) }}"
  tasks:
    - name: Validate required deploy inputs
      ansible.builtin.assert:
        that:
          - lookup('env', 'GCP_PROJECT_ID') | length > 0
          - orchestration_provider in ['gcp', 'baremetal']
        fail_msg: "GCP_PROJECT_ID is required and orchestration_provider must be gcp|baremetal"

    - name: Compute target agent counts
      ansible.builtin.set_fact:
        bootstrap_agent_count: 0
        total_additional_agents: "{{ (num_tiny_agents | int) + (num_standard_agents | int) + (num_llm_agents | int) }}"
        total_agents: "{{ (num_tiny_agents | int) + (num_standard_agents | int) + (num_llm_agents | int) }}"

    - name: Validate agent count and ITA API key requirements
      ansible.builtin.assert:
        that:
          - total_agents | int > 0
          - (total_additional_agents | int == 0) or (ita_api_key | length > 0)
        fail_msg: >-
          Invalid fleet request: total_agents must be > 0 and ITA_API_KEY (or INTEL_API_KEY)
          is required when launching additional agents.

    - name: Allocate control-plane output file
      ansible.builtin.tempfile:
        state: file
        suffix: .json
      register: cp_boot_file

    - name: Launch control plane via Ansible playbook
      ansible.builtin.command:
        argv:
          - ansible-playbook
          - ansible/playbooks/gcp-control-plane-new.yml
          - -e
          - cp_port={{ cp_port }}
          - -e
          - cp_wait=true
          - -e
          - cp_timeout_seconds={{ cp_bootstrap_timeout }}
          - -e
          - cp_zone={{ agent_datacenter_az }}
          - -e
          - output_json_path={{ cp_boot_file.path }}
      environment:
        ANSIBLE_CONFIG: "{{ ansible_config_path }}"
      register: cp_launch_cmd
      changed_when: cp_launch_cmd.rc == 0

    - name: Load control-plane launch metadata
      ansible.builtin.set_fact:
        cp_boot_json: "{{ lookup('file', cp_boot_file.path) | from_json }}"

    - name: Derive control-plane URLs
      ansible.builtin.set_fact:
        cp_bootstrap_url: "{{ cp_boot_json.control_plane_url | default('') }}"
        cp_public_hostname: "{{ cp_boot_json.control_plane_hostname | default('') }}"
        cp_internal_ip: "{{ cp_boot_json.internal_ip | default('') }}"
        cp_external_ip: "{{ cp_boot_json.external_ip | default('') }}"

    - name: Compute agent registration URL
      ansible.builtin.set_fact:
        cp_agent_url: "{{ ('http://' ~ cp_internal_ip ~ ':' ~ (cp_port | string)) if (cp_internal_ip | length > 0) else (('http://' ~ cp_external_ip ~ ':' ~ (cp_port | string)) if (cp_external_ip | length > 0) else cp_bootstrap_url) }}"

    - name: Ensure control-plane bootstrap URL exists
      ansible.builtin.assert:
        that:
          - cp_bootstrap_url | length > 0
        fail_msg: "gcp-control-plane-new did not return control_plane_url"

    - name: Wait for control-plane health endpoint
      ansible.builtin.uri:
        url: "{{ cp_bootstrap_url }}/health"
        method: GET
        status_code: 200
        return_content: true
      register: cp_health
      retries: "{{ [1, ((cp_bootstrap_timeout | int) // 5)] | max }}"
      delay: 5
      until: cp_health.status == 200

    - name: Select fleet launcher playbook
      ansible.builtin.set_fact:
        fleet_playbook: >-
          {{ 'ansible/playbooks/gcp-vm-fleet-new.yml' if orchestration_provider == 'gcp'
          else 'ansible/playbooks/baremetal-vm-fleet-new.yml' }}

    - name: Allocate additional-agent output file
      ansible.builtin.tempfile:
        state: file
        suffix: .json
      register: fleet_output_file
      when: total_additional_agents | int > 0

    - name: Launch additional GCP agents
      ansible.builtin.command:
        argv:
          - ansible-playbook
          - "{{ fleet_playbook }}"
          - -e
          - cp_url={{ cp_agent_url }}
          - -e
          - ita_api_key={{ ita_api_key }}
          - -e
          - num_tiny={{ num_tiny_agents }}
          - -e
          - num_standard={{ num_standard_agents }}
          - -e
          - num_llm={{ num_llm_agents }}
          - -e
          - vm_wait=true
          - -e
          - vm_timeout_seconds={{ cp_bootstrap_timeout }}
          - -e
          - agent_zone={{ agent_datacenter_az }}
          - -e
          - agent_region={{ agent_datacenter_region }}
          - -e
          - agent_datacenter={{ agent_datacenter }}
          - -e
          - output_json_path={{ fleet_output_file.path }}
      environment:
        ANSIBLE_CONFIG: "{{ ansible_config_path }}"
      register: fleet_launch_cmd
      changed_when: fleet_launch_cmd.rc == 0
      when:
        - total_additional_agents | int > 0
        - orchestration_provider == 'gcp'

    - name: Launch additional baremetal agents
      ansible.builtin.command:
        argv:
          - ansible-playbook
          - "{{ fleet_playbook }}"
          - -e
          - cp_url={{ cp_agent_url }}
          - -e
          - ita_api_key={{ ita_api_key }}
          - -e
          - num_tiny={{ num_tiny_agents }}
          - -e
          - num_standard={{ num_standard_agents }}
          - -e
          - num_llm={{ num_llm_agents }}
          - -e
          - vm_wait=true
          - -e
          - vm_timeout_seconds={{ cp_bootstrap_timeout }}
          - -e
          - agent_zone={{ agent_datacenter_az }}
          - -e
          - agent_region={{ agent_datacenter_region }}
          - -e
          - agent_datacenter={{ agent_datacenter }}
          - -e
          - tdx_runner_command={{ lookup('env', 'TDX_RUNNER_COMMAND') | default('tdx-runner vm new', true) }}
          - -e
          - tdx_runner_extra_args={{ lookup('env', 'TDX_RUNNER_EXTRA_ARGS') | default('', true) }}
          - -e
          - output_json_path={{ fleet_output_file.path }}
      environment:
        ANSIBLE_CONFIG: "{{ ansible_config_path }}"
      register: fleet_launch_cmd
      changed_when: fleet_launch_cmd.rc == 0
      when:
        - total_additional_agents | int > 0
        - orchestration_provider == 'baremetal'

    - name: Probe agents API v0 endpoint
      ansible.builtin.uri:
        url: "{{ cp_bootstrap_url }}/api/agents"
        method: GET
        return_content: true
        status_code: [200, 404]
      register: agents_v0_probe

    - name: Probe agents API v1 endpoint when needed
      ansible.builtin.uri:
        url: "{{ cp_bootstrap_url }}/api/v1/agents"
        method: GET
        return_content: true
        status_code: [200, 404]
      register: agents_v1_probe
      when: agents_v0_probe.status != 200

    - name: Select active agents API endpoint
      ansible.builtin.set_fact:
        agents_api_path: >-
          {% if agents_v0_probe.status == 200 %}/api/agents
          {% elif (agents_v1_probe.status | default(404)) == 200 %}/api/v1/agents
          {% else %}__missing__{% endif %}

    - name: Ensure an agents API endpoint is available
      ansible.builtin.assert:
        that:
          - agents_api_path != '__missing__'
        fail_msg: "Neither /api/agents nor /api/v1/agents is available on the control plane"

    - name: Wait for all requested agents to verify
      ansible.builtin.uri:
        url: "{{ cp_bootstrap_url }}{{ agents_api_path }}"
        method: GET
        return_content: true
        status_code: 200
      register: agents_poll
      retries: "{{ agent_verify_wait_attempts | int }}"
      delay: "{{ agent_verify_wait_seconds | int }}"
      until: >-
        (
          (
            ((agents_poll.json | default({})).agents | default([]))
            if ((agents_poll.json | default({})) is mapping)
            else (agents_poll.json | default([]))
          )
          | selectattr('verified', 'equalto', true)
          | list
          | length
        ) >= (total_agents | int)
      ignore_errors: true

    - name: Normalize final agents list
      ansible.builtin.set_fact:
        final_agents_list: >-
          {{
            ((agents_poll.json | default({})).agents | default([]))
            if ((agents_poll.json | default({})) is mapping)
            else (agents_poll.json | default([]))
          }}

    - name: Compute verified agent count
      ansible.builtin.set_fact:
        verified_agents: "{{ final_agents_list | selectattr('verified', 'equalto', true) | list | length }}"

    - name: Print unverified agents when verification target is missed
      ansible.builtin.debug:
        msg: >-
          {{ item }}
      loop: >-
        {{
          final_agents_list
          | rejectattr('verified', 'equalto', true)
          | map('to_json')
          | list
        }}
      when: verified_agents | int < total_agents | int

    - name: Fail when not all agents verified
      ansible.builtin.fail:
        msg: >-
          Not all agents verified ({{ verified_agents }}/{{ total_agents }}).
      when: verified_agents | int < total_agents | int

    - name: Ensure admin password is configured for measurement approval
      ansible.builtin.assert:
        that:
          - admin_password | length > 0
        fail_msg: "ADMIN_PASSWORD (or CP_ADMIN_PASSWORD) is required for trusted measurement approval"

    - name: Admin login
      ansible.builtin.uri:
        url: "{{ cp_bootstrap_url }}/admin/login"
        method: POST
        body_format: json
        body:
          password: "{{ admin_password }}"
        status_code: 200
        return_content: true
      register: admin_login

    - name: Extract admin token
      ansible.builtin.set_fact:
        admin_session_token: "{{ admin_login.json.token | default('') }}"

    - name: Ensure admin token was issued
      ansible.builtin.assert:
        that:
          - admin_session_token | length > 0
        fail_msg: "Admin login succeeded without returning a token"

    - name: Compute node sizes that need trusted measurement approval
      ansible.builtin.set_fact:
        approval_sizes: >-
          {{
            final_agents_list
            | selectattr('verified', 'equalto', true)
            | map(attribute='node_size')
            | map('string')
            | map('lower')
            | select('in', ['tiny', 'standard', 'llm'])
            | unique
            | list
          }}

    - name: Ensure there are verified node sizes to approve
      ansible.builtin.assert:
        that:
          - approval_sizes | length > 0
        fail_msg: "No verified node sizes found; cannot auto-approve trusted measurements"

    - name: Fetch observed measurements for each verified node size
      ansible.builtin.uri:
        url: "{{ cp_bootstrap_url }}/api/admin/measurements/agents?node_size={{ item }}&limit=20"
        method: GET
        headers:
          Authorization: "Bearer {{ admin_session_token }}"
        status_code: 200
        return_content: true
      loop: "{{ approval_sizes }}"
      register: observed_measurements

    - name: Validate observed measurement availability per node size
      ansible.builtin.assert:
        that:
          - (item.json | default([]) | length) > 0
          - (item.json[0].mrtd | default('') | length) > 0
        fail_msg: "No observed measurement with mrtd for node_size='{{ item.item }}'"
      loop: "{{ observed_measurements.results }}"

    - name: Approve trusted measurement for each verified node size
      ansible.builtin.uri:
        url: "{{ cp_bootstrap_url }}/api/admin/trusted-measurements/agent"
        method: POST
        headers:
          Authorization: "Bearer {{ admin_session_token }}"
        body_format: json
        body: >-
          {{
            {
              'node_size': item.item,
              'mrtd': item.json[0].mrtd,
              'source': 'ci-auto-approve'
            }
            | combine((item.json[0].rtmrs is mapping) | ternary({'rtmrs': item.json[0].rtmrs}, {}))
          }}
        status_code: [200, 201, 204]
      loop: "{{ observed_measurements.results }}"

    - name: Admin logout
      ansible.builtin.uri:
        url: "{{ cp_bootstrap_url }}/admin/logout"
        method: POST
        headers:
          Authorization: "Bearer {{ admin_session_token }}"
        status_code: [200, 204, 401]
      failed_when: false

    - name: Persist deploy summary JSON
      ansible.builtin.copy:
        dest: "{{ output_json_path }}"
        mode: "0600"
        content: >-
          {{
            {
              'cp_internal_url': cp_bootstrap_url,
              'cp_public_url': (('https://' ~ cp_public_hostname) if (cp_public_hostname | length > 0) else ''),
              'cp_bootstrap_url': cp_bootstrap_url,
              'cp_agent_url': cp_agent_url,
              'control_plane_name': (cp_boot_json.name | default('')),
              'control_plane_zone': (cp_boot_json.zone | default('')),
              'total_agents': (total_agents | int),
              'verified_agents': (verified_agents | int)
            }
            | to_nice_json
          }}
