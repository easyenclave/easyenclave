---
- name: Cleanup managed GCP VMs
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ee_env_name: ""
  tasks:
    - name: Validate GCP project
      ansible.builtin.assert:
        that:
          - lookup('env', 'GCP_PROJECT_ID') | length > 0
        fail_msg: "GCP_PROJECT_ID is required"

    - name: Build cleanup filter
      ansible.builtin.set_fact:
        cleanup_filter: >-
          labels.easyenclave=managed{% if ee_env_name | length > 0 %} AND labels.ee_env={{ ee_env_name }}{% endif %}

    - name: List managed instances
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - instances
          - list
          - --project
          - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
          - --filter
          - "{{ cleanup_filter }}"
          - --format
          - value(name,zone.basename())
      register: managed_instances_cmd
      changed_when: false

    - name: Normalize managed instances list
      ansible.builtin.set_fact:
        managed_instances: "{{ managed_instances_cmd.stdout_lines | reject('equalto', '') | list }}"

    - name: Print cleanup target summary
      ansible.builtin.debug:
        msg: >-
          Managed instances matching '{{ cleanup_filter }}': {{ managed_instances | length }}

    - name: Delete managed instance
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - instances
          - delete
          - "{{ item.split()[0] }}"
          - --project
          - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
          - --zone
          - "{{ item.split()[1] }}"
          - --quiet
      loop: "{{ managed_instances }}"
      loop_control:
        label: "{{ item }}"
      register: delete_cmd
      when: managed_instances | length > 0
