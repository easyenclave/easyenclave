---
- name: Launch GCP control plane
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    cp_port: 8080
    cp_wait: true
    cp_timeout_seconds: 600
    cp_zone: ""
    cp_size: ""
    output_json_path: /tmp/ee-gcp-control-plane.json
    cp_size_profiles:
      tiny:
        machine_type: c3-standard-4
        disk_gib: 80
      standard:
        machine_type: c3-standard-8
        disk_gib: 100
  tasks:
    - name: Validate GCP project
      ansible.builtin.assert:
        that:
          - lookup('env', 'GCP_PROJECT_ID') | length > 0
        fail_msg: "GCP_PROJECT_ID is required"

    - name: Resolve control-plane defaults
      ansible.builtin.set_fact:
        resolved_env_name: "{{ (lookup('env', 'EASYENCLAVE_ENV') | default('staging', true)) | lower }}"
        resolved_domain: "{{ lookup('env', 'EASYENCLAVE_DOMAIN') | default('easyenclave.com', true) }}"
        resolved_network_name: "{{ lookup('env', 'EASYENCLAVE_NETWORK_NAME') | default('', true) }}"
        resolved_cp_zone: "{{ cp_zone if (cp_zone | length > 0) else ((lookup('env', 'GCP_ZONE') | default(lookup('env', 'AGENT_DATACENTER_AZ'), true)) | default('us-central1-a', true)) }}"

    - name: Resolve control-plane size
      ansible.builtin.set_fact:
        resolved_cp_size: "{{ cp_size | lower if (cp_size | length > 0) else ('tiny' if resolved_env_name == 'staging' else 'standard') }}"

    - name: Validate control-plane size
      ansible.builtin.assert:
        that:
          - resolved_cp_size in cp_size_profiles
        fail_msg: "Unsupported control-plane size '{{ resolved_cp_size }}'"

    - name: Resolve control-plane profile and labels
      ansible.builtin.set_fact:
        cp_profile: "{{ cp_size_profiles[resolved_cp_size] }}"
        env_label: "{{ (resolved_env_name | regex_replace('[^a-z0-9-]+', '-') | regex_replace('-+', '-') | regex_replace('^-+', '') | regex_replace('-+$', '')) or 'staging' }}"
        network_label: "{{ ((resolved_network_name if (resolved_network_name | length > 0) else 'default') | lower | regex_replace('[^a-z0-9-]+', '-') | regex_replace('-+', '-') | regex_replace('^-+', '') | regex_replace('-+$', '')) or 'default' }}"

    - name: Resolve control-plane DNS alias
      ansible.builtin.set_fact:
        alias_host: "{{ ('app-staging.' ~ resolved_domain) if resolved_env_name == 'staging' else ('app.' ~ resolved_domain) }}"
        cp_url_for_agents: "{{ ('https://app-staging.' ~ resolved_domain) if resolved_env_name == 'staging' else ('https://app.' ~ resolved_domain) }}"

    - name: Resolve source image selector values
      ansible.builtin.set_fact:
        source_image_project: "{{ lookup('env', 'EE_GCP_IMAGE_PROJECT') | default(lookup('env', 'GCP_PROJECT_ID'), true) }}"
        source_image_name_env: "{{ lookup('env', 'EE_GCP_IMAGE_NAME') | default('', true) }}"
        source_image_family: "{{ lookup('env', 'EE_GCP_IMAGE_FAMILY') | default('easyenclave-agent-main', true) }}"

    - name: Read source image by explicit name
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - images
          - describe
          - "{{ source_image_name_env }}"
          - --project
          - "{{ source_image_project }}"
          - --format
          - json
      register: source_image_describe_cmd
      changed_when: false
      when: source_image_name_env | length > 0

    - name: Read source image from family
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - images
          - describe-from-family
          - "{{ source_image_family }}"
          - --project
          - "{{ source_image_project }}"
          - --format
          - json
      register: source_image_family_cmd
      changed_when: false
      when: source_image_name_env | length == 0

    - name: Parse source image JSON
      ansible.builtin.set_fact:
        source_image_json: "{{ (source_image_describe_cmd.stdout if (source_image_name_env | length > 0) else source_image_family_cmd.stdout) | from_json }}"

    - name: Extract source image values
      ansible.builtin.set_fact:
        source_image_name: "{{ source_image_json.name | default(source_image_name_env) }}"
        source_image_disk_gib: "{{ source_image_json.diskSizeGb | default('0') }}"

    - name: Validate resolved source image metadata
      ansible.builtin.assert:
        that:
          - source_image_name | length > 0
          - source_image_disk_gib is match('^[0-9]+$')
        fail_msg: "Failed to resolve source image and disk size"

    - name: Resolve control-plane boot disk size
      ansible.builtin.set_fact:
        cp_boot_disk_gib: "{{ [cp_profile.disk_gib | int, source_image_disk_gib | int] | max }}"

    - name: Resolve control-plane config env inputs
      ansible.builtin.set_fact:
        admin_password_env: "{{ lookup('env', 'CP_ADMIN_PASSWORD') | default(lookup('env', 'ADMIN_PASSWORD'), true) }}"
        ee_agent_ita_api_key_env: "{{ lookup('env', 'EE_AGENT_ITA_API_KEY') | default(lookup('env', 'ITA_API_KEY') | default(lookup('env', 'INTEL_API_KEY'), true), true) }}"

    - name: Build control-plane config payload
      ansible.builtin.set_fact:
        control_plane_config_all:
          port: "{{ cp_port | int }}"
          control_plane_image: "{{ lookup('env', 'CONTROL_PLANE_IMAGE') | default('', true) }}"
          easyenclave_domain: "{{ lookup('env', 'EASYENCLAVE_DOMAIN') | default('', true) }}"
          easyenclave_env: "{{ lookup('env', 'EASYENCLAVE_ENV') | default('', true) }}"
          easyenclave_network_name: "{{ lookup('env', 'EASYENCLAVE_NETWORK_NAME') | default('', true) }}"
          easyenclave_boot_id: "{{ lookup('env', 'EASYENCLAVE_BOOT_ID') | default('', true) }}"
          easyenclave_git_sha: "{{ lookup('env', 'EASYENCLAVE_GIT_SHA') | default('', true) }}"
          easyenclave_release_tag: "{{ lookup('env', 'EASYENCLAVE_RELEASE_TAG') | default('', true) }}"
          easyenclave_cp_url: "{{ cp_url_for_agents }}"
          cloudflare_api_token: "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') | default('', true) }}"
          cloudflare_account_id: "{{ lookup('env', 'CLOUDFLARE_ACCOUNT_ID') | default('', true) }}"
          cloudflare_zone_id: "{{ lookup('env', 'CLOUDFLARE_ZONE_ID') | default('', true) }}"
          admin_password: "{{ admin_password_env }}"
          admin_github_logins: "{{ lookup('env', 'ADMIN_GITHUB_LOGINS') | default('', true) }}"
          admin_password_hash: "{{ lookup('env', 'ADMIN_PASSWORD_HASH') | default('', true) }}"
          ee_agent_ita_api_key: "{{ ee_agent_ita_api_key_env }}"
          gcp_project_id: "{{ lookup('env', 'GCP_PROJECT_ID') | default('', true) }}"
          gcp_service_account_key: "{{ lookup('env', 'GCP_SERVICE_ACCOUNT_KEY') | default('', true) }}"
          ee_gcp_image_project: "{{ lookup('env', 'EE_GCP_IMAGE_PROJECT') | default('', true) }}"
          ee_gcp_image_family: "{{ lookup('env', 'EE_GCP_IMAGE_FAMILY') | default('', true) }}"
          ee_gcp_image_name: "{{ lookup('env', 'EE_GCP_IMAGE_NAME') | default('', true) }}"
          github_oauth_client_id: "{{ lookup('env', 'GITHUB_OAUTH_CLIENT_ID') | default('', true) }}"
          github_oauth_client_secret: "{{ lookup('env', 'GITHUB_OAUTH_CLIENT_SECRET') | default('', true) }}"
          github_oauth_redirect_uri: "{{ lookup('env', 'GITHUB_OAUTH_REDIRECT_URI') | default('', true) }}"
          trusted_agent_mrtds: "{{ lookup('env', 'TRUSTED_AGENT_MRTDS') | default('', true) }}"
          trusted_proxy_mrtds: "{{ lookup('env', 'TRUSTED_PROXY_MRTDS') | default('', true) }}"
          trusted_agent_rtmrs: "{{ lookup('env', 'TRUSTED_AGENT_RTMRS') | default('', true) }}"
          trusted_proxy_rtmrs: "{{ lookup('env', 'TRUSTED_PROXY_RTMRS') | default('', true) }}"
          trusted_agent_rtmrs_by_size: "{{ lookup('env', 'TRUSTED_AGENT_RTMRS_BY_SIZE') | default('', true) }}"
          trusted_proxy_rtmrs_by_size: "{{ lookup('env', 'TRUSTED_PROXY_RTMRS_BY_SIZE') | default('', true) }}"
          tcb_enforcement_mode: "{{ lookup('env', 'TCB_ENFORCEMENT_MODE') | default('', true) }}"
          allowed_tcb_statuses: "{{ lookup('env', 'ALLOWED_TCB_STATUSES') | default('', true) }}"
          nonce_enforcement_mode: "{{ lookup('env', 'NONCE_ENFORCEMENT_MODE') | default('', true) }}"
          rtmr_enforcement_mode: "{{ lookup('env', 'RTMR_ENFORCEMENT_MODE') | default('', true) }}"
          signature_verification_mode: "{{ lookup('env', 'SIGNATURE_VERIFICATION_MODE') | default('', true) }}"
          cp_to_agent_attestation_mode: "{{ lookup('env', 'CP_TO_AGENT_ATTESTATION_MODE') | default('', true) }}"
          auth_require_github_oauth_in_production: "{{ lookup('env', 'AUTH_REQUIRE_GITHUB_OAUTH_IN_PRODUCTION') | default('', true) }}"
          password_login_enabled: "{{ lookup('env', 'PASSWORD_LOGIN_ENABLED') | default('', true) }}"
          auth_allow_password_login_in_production: "{{ lookup('env', 'AUTH_ALLOW_PASSWORD_LOGIN_IN_PRODUCTION') | default('', true) }}"
          billing_enabled: "{{ lookup('env', 'BILLING_ENABLED') | default('', true) }}"
          billing_capacity_request_dev_simulation: "{{ lookup('env', 'BILLING_CAPACITY_REQUEST_DEV_SIMULATION') | default('', true) }}"
          cp_ita_jwks_url: https://portal.trustauthority.intel.com/certs
          cp_ita_issuer: https://portal.trustauthority.intel.com

    - name: Remove empty config values
      ansible.builtin.set_fact:
        control_plane_config: "{{ control_plane_config_all | dict2items | rejectattr('value', 'equalto', '') | rejectattr('value', 'equalto', none) | items2dict }}"

    - name: Generate control-plane VM name components
      ansible.builtin.set_fact:
        cp_name_seed_raw: "{{ resolved_network_name if (resolved_network_name | length > 0) else lookup('pipe', 'cat /proc/sys/kernel/random/uuid | tr -d - | cut -c1-8') }}"
        cp_name_seed_label: "{{ ((cp_name_seed_raw | lower) | regex_replace('[^a-z0-9-]+', '-') | regex_replace('-+', '-') | regex_replace('^-+', '') | regex_replace('-+$', '')) or 'default' }}"
        cp_name_candidate: "ee-cp-{{ env_label }}-{{ cp_name_seed_label }}-{{ lookup('pipe', 'date +%s') }}"

    - name: Finalize control-plane VM name
      ansible.builtin.set_fact:
        cp_name: "{{ (((cp_name_candidate | lower | regex_replace('[^a-z0-9-]+', '-') | regex_replace('-+', '-') | regex_replace('^-+', '') | regex_replace('-+$', '')) | truncate(63, true, '')) | regex_replace('-+$', '')) or ('ee-cp-' ~ lookup('pipe', 'date +%s')) }}"
    - name: Allocate startup script file
      ansible.builtin.tempfile:
        state: file
        suffix: .sh
      register: cp_startup_script_file

    - name: Render control-plane startup script
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/control-plane-startup.sh.j2"
        dest: "{{ cp_startup_script_file.path }}"
        mode: "0755"
      vars:
        control_plane_config_json: "{{ control_plane_config | to_nice_json }}"

    - name: Create control-plane VM
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - instances
          - create
          - "{{ cp_name }}"
          - --project
          - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
          - --zone
          - "{{ resolved_cp_zone }}"
          - --machine-type
          - "{{ cp_profile.machine_type }}"
          - --boot-disk-size
          - "{{ cp_boot_disk_gib }}GB"
          - --boot-disk-type
          - pd-balanced
          - --maintenance-policy
          - TERMINATE
          - --provisioning-model
          - STANDARD
          - --confidential-compute-type
          - TDX
          - --labels
          - "easyenclave=managed,ee_role=control-plane,ee_env={{ env_label }},ee_network={{ network_label }}"
          - --metadata
          - serial-port-enable=1,enable-oslogin=FALSE
          - --metadata-from-file
          - "startup-script={{ cp_startup_script_file.path }}"
          - --scopes
          - https://www.googleapis.com/auth/cloud-platform
          - --image-project
          - "{{ source_image_project }}"
          - --image
          - "{{ source_image_name }}"

    - name: Remove temporary startup script
      ansible.builtin.file:
        path: "{{ cp_startup_script_file.path }}"
        state: absent
      when: cp_startup_script_file.path is defined

    - name: Wait for control-plane VM status RUNNING
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - instances
          - describe
          - "{{ cp_name }}"
          - --project
          - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
          - --zone
          - "{{ resolved_cp_zone }}"
          - --format
          - value(status)
      register: cp_status_cmd
      changed_when: false
      retries: 100
      delay: 3
      until: (cp_status_cmd.stdout | trim | upper) == 'RUNNING'

    - name: Read control-plane VM metadata
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - instances
          - describe
          - "{{ cp_name }}"
          - --project
          - "{{ lookup('env', 'GCP_PROJECT_ID') }}"
          - --zone
          - "{{ resolved_cp_zone }}"
          - --format
          - json
      register: cp_meta_cmd
      changed_when: false

    - name: Parse control-plane VM metadata
      ansible.builtin.set_fact:
        cp_meta: "{{ cp_meta_cmd.stdout | from_json }}"
        cp_internal_ip: "{{ ((cp_meta_cmd.stdout | from_json).networkInterfaces | default([]) | first | default({})).networkIP | default('') }}"
        cp_external_ip: "{{ (((cp_meta_cmd.stdout | from_json).networkInterfaces | default([]) | first | default({})).accessConfigs | default([]) | first | default({})).natIP | default('') }}"

    - name: Set default control-plane URL
      ansible.builtin.set_fact:
        selected_url: "https://{{ alias_host }}"

    - name: Probe external control-plane health URL
      ansible.builtin.uri:
        url: "http://{{ cp_external_ip }}:{{ cp_port }}/health"
        method: GET
        status_code: 200
      register: cp_external_health
      retries: "{{ [1, ((cp_timeout_seconds | int + 2) // 3)] | max }}"
      delay: 3
      until: cp_external_health.status == 200
      failed_when: false
      when:
        - cp_wait | bool
        - cp_external_ip | length > 0

    - name: Select external URL when healthy
      ansible.builtin.set_fact:
        selected_url: "http://{{ cp_external_ip }}:{{ cp_port }}"
      when:
        - cp_wait | bool
        - cp_external_health is defined
        - cp_external_health.status | default(0) == 200

    - name: Probe internal control-plane health URL
      ansible.builtin.uri:
        url: "http://{{ cp_internal_ip }}:{{ cp_port }}/health"
        method: GET
        status_code: 200
      register: cp_internal_health
      retries: "{{ [1, ((cp_timeout_seconds | int + 2) // 3)] | max }}"
      delay: 3
      until: cp_internal_health.status == 200
      failed_when: false
      when:
        - cp_wait | bool
        - cp_internal_ip | length > 0
        - selected_url == ('https://' ~ alias_host)

    - name: Select internal URL when healthy
      ansible.builtin.set_fact:
        selected_url: "http://{{ cp_internal_ip }}:{{ cp_port }}"
      when:
        - cp_wait | bool
        - cp_internal_health is defined
        - cp_internal_health.status | default(0) == 200

    - name: Write control-plane metadata JSON
      ansible.builtin.copy:
        dest: "{{ output_json_path }}"
        mode: "0600"
        content: >-
          {{
            {
              'name': cp_name,
              'zone': resolved_cp_zone,
              'ip': (cp_external_ip if (cp_external_ip | length > 0) else cp_internal_ip),
              'internal_ip': cp_internal_ip,
              'external_ip': cp_external_ip,
              'control_plane_url': selected_url,
              'control_plane_hostname': alias_host,
              'bootstrap_agents': []
            } | to_nice_json
          }}

    - name: Load control-plane metadata JSON
      ansible.builtin.set_fact:
        cp_boot_json: "{{ lookup('file', output_json_path) | from_json }}"

    - name: Print control-plane metadata
      ansible.builtin.debug:
        var: cp_boot_json
