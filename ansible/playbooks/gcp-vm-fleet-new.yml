---
- name: Launch GCP VM fleet
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    cp_url: ""
    ita_api_key: ""
    num_tiny: 0
    num_standard: 0
    num_llm: 0
    vm_wait: true
    vm_timeout_seconds: 600
    agent_zone: ""
    agent_region: ""
    agent_datacenter: ""
    output_json_path: /tmp/ee-gcp-vm-fleet.json
    size_profiles:
      tiny:
        machine_type: c3-standard-4
        disk_gib: 80
      standard:
        machine_type: c3-standard-8
        disk_gib: 100
      llm:
        machine_type: c3-standard-22
        disk_gib: 140
  tasks:
    - name: Validate required vars
      ansible.builtin.assert:
        that:
          - lookup('env', 'GCP_PROJECT_ID') | length > 0
          - cp_url | length > 0
          - ita_api_key | length > 0
        fail_msg: "GCP_PROJECT_ID, cp_url and ita_api_key are required"

    - name: Build launch-size list
      ansible.builtin.set_fact:
        launch_sizes: "{{ (['tiny'] * (num_tiny | int)) + (['standard'] * (num_standard | int)) + (['llm'] * (num_llm | int)) }}"

    - name: Resolve runtime defaults
      ansible.builtin.set_fact:
        resolved_zone: "{{ agent_zone if (agent_zone | length > 0) else (lookup('env', 'GCP_ZONE') | default('us-central1-a', true)) }}"
        resolved_region: "{{ agent_region }}"
        resolved_env_name: "{{ lookup('env', 'EASYENCLAVE_ENV') | default('staging', true) }}"
        resolved_network_name: "{{ lookup('env', 'EASYENCLAVE_NETWORK_NAME') | default('', true) }}"
        env_label: "{{ ((lookup('env', 'EASYENCLAVE_ENV') | default('staging', true) | lower) | regex_replace('[^a-z0-9-]+', '-') | regex_replace('-+', '-') | regex_replace('^-+', '') | regex_replace('-+$', '')) or 'staging' }}"
        network_label: "{{ ((lookup('env', 'EASYENCLAVE_NETWORK_NAME') | default('default', true) | lower) | regex_replace('[^a-z0-9-]+', '-') | regex_replace('-+', '-') | regex_replace('^-+', '') | regex_replace('-+$', '')) or 'default' }}"

    - name: Resolve source image selector values
      ansible.builtin.set_fact:
        source_image_project: "{{ lookup('env', 'EE_GCP_IMAGE_PROJECT') | default(lookup('env', 'GCP_PROJECT_ID'), true) }}"
        source_image_name_env: "{{ lookup('env', 'EE_GCP_IMAGE_NAME') | default('', true) }}"
        source_image_family: "{{ lookup('env', 'EE_GCP_IMAGE_FAMILY') | default('easyenclave-agent-main', true) }}"

    - name: Read source image by explicit name
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - images
          - describe
          - "{{ source_image_name_env }}"
          - --project
          - "{{ source_image_project }}"
          - --format
          - json
      register: source_image_describe_cmd
      changed_when: false
      when: source_image_name_env | length > 0

    - name: Read source image from family
      ansible.builtin.command:
        argv:
          - gcloud
          - compute
          - images
          - describe-from-family
          - "{{ source_image_family }}"
          - --project
          - "{{ source_image_project }}"
          - --format
          - json
      register: source_image_family_cmd
      changed_when: false
      when: source_image_name_env | length == 0

    - name: Parse source image JSON
      ansible.builtin.set_fact:
        source_image_json: "{{ (source_image_describe_cmd.stdout if (source_image_name_env | length > 0) else source_image_family_cmd.stdout) | from_json }}"

    - name: Extract source image values
      ansible.builtin.set_fact:
        source_image_name: "{{ source_image_json.name | default(source_image_name_env) }}"
        source_image_disk_gib: "{{ source_image_json.diskSizeGb | default('0') }}"

    - name: Validate resolved source image metadata
      ansible.builtin.assert:
        that:
          - source_image_name | length > 0
          - source_image_disk_gib is match('^[0-9]+$')
        fail_msg: "Failed to resolve source image and disk size"

    - name: Initialize launched VM list
      ansible.builtin.set_fact:
        launched_vms: []

    - name: Launch each requested VM
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/gcp-vm-launch-one.yml"
      loop: "{{ launch_sizes }}"
      loop_control:
        loop_var: launch_size
      when: launch_sizes | length > 0

    - name: Write launched VM JSON output file
      ansible.builtin.copy:
        dest: "{{ output_json_path }}"
        content: "{{ launched_vms | default([]) | to_nice_json }}\n"
        mode: "0600"
