[package]
name = "easyenclave"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["easyenclave"]

[lib]
name = "easyenclave"
path = "src/lib.rs"

[[bin]]
name = "ee-cp"
path = "src/bin/ee-cp/main.rs"

[[bin]]
name = "ee-agent"
path = "src/bin/ee-agent/main.rs"

[[bin]]
name = "ee-admin"
path = "src/bin/ee-admin/main.rs"

[dependencies]
argon2 = "0.5"
axum = "0.8"
base64 = "0.22"
bcrypt = "0.15"
bollard = "0.18"
chrono = { version = "0.4", features = ["serde"] }
futures-util = "0.3"
http = "1"
jsonwebtoken = "9"
rand_core = { version = "0.6", features = ["getrandom"] }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
rpassword = "7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "sqlite"] }
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
uuid = { version = "1", features = ["serde", "v4"] }

[dev-dependencies]
mockito = "1"
tower = "0.5"

[build-dependencies]
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
