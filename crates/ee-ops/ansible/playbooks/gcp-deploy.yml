---
- name: Deploy control plane and agent fleet on GCP
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    cp_port: 8080
    cp_bootstrap_timeout: 600
    num_tiny_agents: 1
    num_standard_agents: 0
    num_llm_agents: 0
    orchestration_provider: gcp
    agent_datacenter: ""
    agent_datacenter_az: us-central1-f
    agent_datacenter_region: ""
    agent_verify_wait_attempts: 90
    agent_verify_wait_seconds: 10
    cp_tunnel_port: 18080
    output_json_path: /tmp/ee-ci-deploy.json
  tasks:
    - name: Deploy via ansible-orchestrated shell flow
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail

          cd "$(git rev-parse --show-toplevel)"
  
          CP_URL="${CP_URL:-https://app.easyenclave.com}"
          NUM_TINY_AGENTS="${NUM_TINY_AGENTS:-1}"
          NUM_STANDARD_AGENTS="${NUM_STANDARD_AGENTS:-0}"
          NUM_LLM_AGENTS="${NUM_LLM_AGENTS:-0}"
          ORCHESTRATION_PROVIDER="$(echo "${ORCHESTRATION_PROVIDER:-gcp}" | tr '[:upper:]' '[:lower:]')"
          AGENT_DATACENTER="${AGENT_DATACENTER:-}"
          AGENT_DATACENTER_AZ="${AGENT_DATACENTER_AZ:-us-central1-f}"
          AGENT_DATACENTER_REGION="${AGENT_DATACENTER_REGION:-}"
          CP_BOOTSTRAP_TIMEOUT="${CP_BOOTSTRAP_TIMEOUT:-600}"
          AGENT_VERIFY_WAIT_ATTEMPTS="${AGENT_VERIFY_WAIT_ATTEMPTS:-90}"
          AGENT_VERIFY_WAIT_SECONDS="${AGENT_VERIFY_WAIT_SECONDS:-10}"
          CURL_HEALTH_ARGS=(--connect-timeout 3 --max-time 5)
          CURL_API_ARGS=(--connect-timeout 3 --max-time 10)
          CP_TUNNEL_PORT="${CP_TUNNEL_PORT:-18080}"
          CP_TUNNEL_PID=""
          CP_TUNNEL_LOG=""
          OUTPUT_JSON_PATH="${OUTPUT_JSON_PATH:-/tmp/ee-ci-deploy.json}"
          ANSIBLE_DIR="crates/ee-ops/ansible"
  
          cleanup_cp_tunnel() {
            if [ -n "${CP_TUNNEL_PID:-}" ] && kill -0 "$CP_TUNNEL_PID" 2>/dev/null; then
              kill "$CP_TUNNEL_PID" 2>/dev/null || true
              wait "$CP_TUNNEL_PID" 2>/dev/null || true
            fi
            if [ -n "${CP_TUNNEL_LOG:-}" ] && [ -f "$CP_TUNNEL_LOG" ]; then
              rm -f "$CP_TUNNEL_LOG" || true
            fi
          }
  
          trap cleanup_cp_tunnel EXIT
  
          require_cmd() {
            local cmd="$1"
            if ! command -v "$cmd" >/dev/null 2>&1; then
              echo "::error::Required command not found: $cmd"
              exit 1
            fi
          }
  
          run_ansible_playbook() {
            local playbook="$1"
            shift
            ANSIBLE_CONFIG="$ANSIBLE_DIR/ansible.cfg" ansible-playbook "$playbook" "$@"
          }
  
          launch_additional_agents() {
            local cp_agent_url="$1"
            local output_json_path="$2"
            local ita_key="${ITA_API_KEY:-}"
            if [ -z "$ita_key" ]; then
              ita_key="${INTEL_API_KEY:-}"
            fi
  
            if [ "$ORCHESTRATION_PROVIDER" = "gcp" ]; then
              run_ansible_playbook "$ANSIBLE_DIR/playbooks/gcp-vm-fleet-new.yml" \
                -e "cp_url=$cp_agent_url" \
                -e "ita_api_key=$ita_key" \
                -e "num_tiny=$NUM_TINY_AGENTS" \
                -e "num_standard=$NUM_STANDARD_AGENTS" \
                -e "num_llm=$NUM_LLM_AGENTS" \
                -e "vm_wait=true" \
                -e "vm_timeout_seconds=$CP_BOOTSTRAP_TIMEOUT" \
                -e "agent_zone=$AGENT_DATACENTER_AZ" \
                -e "agent_region=$AGENT_DATACENTER_REGION" \
                -e "agent_datacenter=$AGENT_DATACENTER" \
                -e "output_json_path=$output_json_path"
              return 0
            fi
  
            if [ "$ORCHESTRATION_PROVIDER" = "baremetal" ]; then
              run_ansible_playbook "$ANSIBLE_DIR/playbooks/baremetal-vm-fleet-new.yml" \
                -e "cp_url=$cp_agent_url" \
                -e "ita_api_key=$ita_key" \
                -e "num_tiny=$NUM_TINY_AGENTS" \
                -e "num_standard=$NUM_STANDARD_AGENTS" \
                -e "num_llm=$NUM_LLM_AGENTS" \
                -e "vm_wait=true" \
                -e "vm_timeout_seconds=$CP_BOOTSTRAP_TIMEOUT" \
                -e "agent_zone=$AGENT_DATACENTER_AZ" \
                -e "agent_region=$AGENT_DATACENTER_REGION" \
                -e "agent_datacenter=$AGENT_DATACENTER" \
                -e "tdx_runner_command=${TDX_RUNNER_COMMAND:-tdx-runner vm new}" \
                -e "tdx_runner_extra_args=${TDX_RUNNER_EXTRA_ARGS:-}" \
                -e "output_json_path=$output_json_path"
              return 0
            fi
  
            echo "::error::Unsupported ORCHESTRATION_PROVIDER='$ORCHESTRATION_PROVIDER' (expected gcp|baremetal)"
            return 1
          }
  
          start_cp_local_tunnel() {
            local cp_name="$1"
            local cp_zone="$2"
            local local_port="$3"
            local project_args=()
            local health_url="http://127.0.0.1:${local_port}/health"
  
            if [ -z "$cp_name" ] || [ -z "$cp_zone" ]; then
              return 1
            fi
            if ! command -v gcloud >/dev/null 2>&1; then
              return 1
            fi
  
            if [ -n "${GCP_PROJECT_ID:-}" ]; then
              project_args=(--project "$GCP_PROJECT_ID")
            fi
  
            CP_TUNNEL_LOG="$(mktemp -t ee-cp-tunnel.XXXXXX.log)"
            gcloud compute ssh "$cp_name" \
              "${project_args[@]}" \
              --zone "$cp_zone" \
              --quiet \
              --ssh-flag="-N" \
              --ssh-flag="-L" \
              --ssh-flag="127.0.0.1:${local_port}:127.0.0.1:8080" \
              --ssh-flag="-o" \
              --ssh-flag="ExitOnForwardFailure=yes" \
              --ssh-flag="-o" \
              --ssh-flag="ServerAliveInterval=30" \
              --ssh-flag="-o" \
              --ssh-flag="ServerAliveCountMax=3" \
              >"$CP_TUNNEL_LOG" 2>&1 &
            CP_TUNNEL_PID=$!
  
            for _i in {1..30}; do
              if curl -sfS "${CURL_HEALTH_ARGS[@]}" "$health_url" >/dev/null 2>&1; then
                echo "Established control-plane SSH tunnel on localhost:${local_port}"
                return 0
              fi
              if ! kill -0 "$CP_TUNNEL_PID" 2>/dev/null; then
                echo "::warning::Control-plane SSH tunnel failed to start"
                tail -n 50 "$CP_TUNNEL_LOG" || true
                CP_TUNNEL_PID=""
                return 1
              fi
              sleep 1
            done
  
            echo "::warning::Timed out waiting for control-plane SSH tunnel on localhost:${local_port}"
            tail -n 50 "$CP_TUNNEL_LOG" || true
            return 1
          }
  
          require_cmd ansible-playbook
  
          echo "==> Deploying control plane on GCP..."
          CP_BOOT_JSON_FILE="$(mktemp -t ee-cp-boot.XXXXXX.json)"
          run_ansible_playbook "$ANSIBLE_DIR/playbooks/gcp-control-plane-new.yml" \
            -e "cp_port=$CP_PORT" \
            -e "cp_wait=true" \
            -e "cp_timeout_seconds=$CP_BOOTSTRAP_TIMEOUT" \
            -e "cp_zone=$AGENT_DATACENTER_AZ" \
            -e "output_json_path=$CP_BOOT_JSON_FILE"
          CP_BOOT_JSON="$(cat "$CP_BOOT_JSON_FILE")"
          rm -f "$CP_BOOT_JSON_FILE" || true
  
          CP_BOOTSTRAP_URL="$(echo "$CP_BOOT_JSON" | jq -r '.control_plane_url // ""')"
          CP_PUBLIC_HOSTNAME="$(echo "$CP_BOOT_JSON" | jq -r '.control_plane_hostname // ""')"
          CP_EXTERNAL_IP="$(echo "$CP_BOOT_JSON" | jq -r '.external_ip // ""')"
          CP_INTERNAL_IP="$(echo "$CP_BOOT_JSON" | jq -r '.internal_ip // ""')"
          CP_NAME="$(echo "$CP_BOOT_JSON" | jq -r '.name // ""')"
          CP_ZONE="$(echo "$CP_BOOT_JSON" | jq -r '.zone // ""')"
          BOOTSTRAP_AGENT_COUNT="$(echo "$CP_BOOT_JSON" | jq -r '(.bootstrap_agents // []) | length' 2>/dev/null || echo 0)"
  
          if [ -z "$CP_BOOTSTRAP_URL" ] || [ "$CP_BOOTSTRAP_URL" = "null" ]; then
            echo "::error::control-plane new did not return control_plane_url"
            echo "$CP_BOOT_JSON" | head -c 5000 || true
            exit 1
          fi
  
          CP_IP_URL=""
          if [ -n "${CP_EXTERNAL_IP:-}" ] && [ "$CP_EXTERNAL_IP" != "null" ]; then
            CP_IP_URL="http://$CP_EXTERNAL_IP:8080"
          elif [ -n "${CP_INTERNAL_IP:-}" ] && [ "$CP_INTERNAL_IP" != "null" ]; then
            CP_IP_URL="http://$CP_INTERNAL_IP:8080"
          fi
  
          if [ -n "$CP_PUBLIC_HOSTNAME" ] && [ "$CP_PUBLIC_HOSTNAME" != "null" ]; then
            echo "Control plane hostname advertised: https://$CP_PUBLIC_HOSTNAME"
            CP_URL_CANDIDATE="https://$CP_PUBLIC_HOSTNAME"
          else
            CP_URL_CANDIDATE=""
          fi
  
          if [ -n "${CP_INTERNAL_IP:-}" ] && [ "$CP_INTERNAL_IP" != "null" ]; then
            CP_AGENT_URL="http://$CP_INTERNAL_IP:8080"
          elif [ -n "${CP_EXTERNAL_IP:-}" ] && [ "$CP_EXTERNAL_IP" != "null" ]; then
            CP_AGENT_URL="http://$CP_EXTERNAL_IP:8080"
          elif [ -n "${CP_URL_CANDIDATE:-}" ]; then
            CP_AGENT_URL="$CP_URL_CANDIDATE"
          else
            CP_AGENT_URL="$CP_BOOTSTRAP_URL"
          fi
  
          CP_INTERNAL_URL=""
          if [ -n "${CP_IP_URL:-}" ]; then
            if curl -sfS "${CURL_HEALTH_ARGS[@]}" "$CP_IP_URL/health" > /dev/null 2>&1; then
              CP_INTERNAL_URL="$CP_IP_URL"
              echo "Using direct control-plane IP URL for bootstrap: $CP_INTERNAL_URL"
            else
              echo "::warning::Direct control-plane IP URL not reachable from runner: $CP_IP_URL"
            fi
          fi
  
          if [ -z "$CP_INTERNAL_URL" ] && start_cp_local_tunnel "$CP_NAME" "$CP_ZONE" "$CP_TUNNEL_PORT"; then
            CP_INTERNAL_URL="http://127.0.0.1:${CP_TUNNEL_PORT}"
          fi
  
          if [ -z "$CP_INTERNAL_URL" ] && [ -n "${CP_URL_CANDIDATE:-}" ]; then
            CP_INTERNAL_URL="$CP_URL_CANDIDATE"
          fi
  
          if [ -z "$CP_INTERNAL_URL" ]; then
            CP_INTERNAL_URL="$CP_BOOTSTRAP_URL"
            echo "::warning::Falling back to control-plane bootstrap URL: $CP_INTERNAL_URL"
          fi
  
          CP_URL="$CP_INTERNAL_URL"
          CP_PUBLIC_URL=""
          echo "Agent registration URL: $CP_AGENT_URL"
  
          echo "==> Waiting for control plane health at $CP_URL ..."
          for _i in {1..30}; do
            if curl -sfS "${CURL_HEALTH_ARGS[@]}" "$CP_URL/health" > /dev/null 2>&1; then
              echo "Control plane is up"
              break
            fi
            sleep 10
          done
          if ! curl -sfS "${CURL_HEALTH_ARGS[@]}" "$CP_URL/health" > /dev/null 2>&1; then
            echo "::error::Control plane not ready after 5 minutes"
            exit 1
          fi
  
          if [ -n "${CP_URL_CANDIDATE:-}" ]; then
            echo "==> Waiting briefly for public URL $CP_URL_CANDIDATE ..."
            for _i in {1..30}; do
              if curl -sfS "${CURL_HEALTH_ARGS[@]}" "$CP_URL_CANDIDATE/health" > /dev/null 2>&1; then
                echo "Public URL is up: $CP_URL_CANDIDATE"
                CP_PUBLIC_URL="$CP_URL_CANDIDATE"
                break
              fi
              sleep 2
            done
          fi
  
          if [ -z "${ADMIN_PASSWORD:-}" ]; then
            echo "::error::Missing ADMIN_PASSWORD; CI must login as admin to approve observed agent measurements."
            exit 1
          fi
  
          if ! [[ "$BOOTSTRAP_AGENT_COUNT" =~ ^[0-9]+$ ]]; then
            BOOTSTRAP_AGENT_COUNT=0
          fi
  
          TOTAL_ADDITIONAL_AGENTS=$((NUM_TINY_AGENTS + NUM_STANDARD_AGENTS + NUM_LLM_AGENTS))
          TOTAL_AGENTS=$((BOOTSTRAP_AGENT_COUNT + TOTAL_ADDITIONAL_AGENTS))
          if [ "$TOTAL_AGENTS" -le 0 ]; then
            echo "::error::No agents available (bootstrap=0 and additional requested=0)"
            exit 1
          fi
          if [ "$TOTAL_ADDITIONAL_AGENTS" -gt 0 ] && [ -z "${ITA_API_KEY:-}" ] && [ -z "${INTEL_API_KEY:-}" ]; then
            echo "::error::Missing ITA_API_KEY (Intel Trust Authority API key). Agents must mint ITA tokens for registration."
            exit 1
          fi
          echo "Bootstrap agents already launched by control-plane new: $BOOTSTRAP_AGENT_COUNT"
          echo "==> Launching $TOTAL_ADDITIONAL_AGENTS additional agents via ansible ($ORCHESTRATION_PROVIDER)"
          if [ -n "$AGENT_DATACENTER" ]; then
            echo "Using explicit agent datacenter label: $AGENT_DATACENTER"
          else
            echo "Using agent placement metadata: az=$AGENT_DATACENTER_AZ region=${AGENT_DATACENTER_REGION:-none}"
          fi
  
          AGENT_LAUNCH_JSON_FILE="$(mktemp -t ee-agent-launch.XXXXXX.json)"
          if [ "$TOTAL_ADDITIONAL_AGENTS" -gt 0 ]; then
            launch_additional_agents "$CP_AGENT_URL" "$AGENT_LAUNCH_JSON_FILE"
            if [ -s "$AGENT_LAUNCH_JSON_FILE" ]; then
              echo "Agent launch records:"
              jq . "$AGENT_LAUNCH_JSON_FILE" || true
            fi
          fi
          rm -f "$AGENT_LAUNCH_JSON_FILE" || true
          echo "Additional agent launches complete; expected verified total: $TOTAL_AGENTS"
  
          agents_to_array() {
            jq -c 'if type == "array" then . else (.agents // []) end'
          }
  
          fetch_agents_raw() {
            local body
            body="$(curl -sfS "${CURL_API_ARGS[@]}" "$CP_URL/api/agents" 2>/dev/null || true)"
            if [ -n "${body:-}" ]; then
              echo "$body"
              return 0
            fi
            body="$(curl -sfS "${CURL_API_ARGS[@]}" "$CP_URL/api/v1/agents" 2>/dev/null || true)"
            if [ -n "${body:-}" ]; then
              echo "$body"
              return 0
            fi
            return 1
          }
  
          admin_login() {
            local login_payload token
            login_payload="$(jq -cn --arg password "$ADMIN_PASSWORD" '{password: $password}')"
            token="$(
              curl -sfS "${CURL_API_ARGS[@]}" \
                -H "content-type: application/json" \
                -X POST \
                --data "$login_payload" \
                "$CP_URL/admin/login" \
                | jq -r '.token // ""'
            )"
            if [ -z "$token" ] || [ "$token" = "null" ]; then
              echo "::error::Admin login succeeded without returning a token"
              return 1
            fi
            echo "$token"
          }
  
          approve_trusted_measurement_for_size() {
            local admin_token="$1"
            local node_size="$2"
            local observed_json selected mrtd rtmrs payload
  
            observed_json="$(
              curl -sfS "${CURL_API_ARGS[@]}" \
                -H "Authorization: Bearer $admin_token" \
                "$CP_URL/api/admin/measurements/agents?node_size=${node_size}&limit=20"
            )"
  
            selected="$(echo "$observed_json" | jq -c 'first(.[] // empty) // empty')"
            if [ -z "$selected" ]; then
              echo "::error::No observed agent measurements found for node_size='${node_size}'"
              return 1
            fi
  
            mrtd="$(echo "$selected" | jq -r '.mrtd // ""')"
            if [ -z "$mrtd" ] || [ "$mrtd" = "null" ]; then
              echo "::error::Observed measurement for node_size='${node_size}' is missing mrtd"
              return 1
            fi
            rtmrs="$(echo "$selected" | jq -c '.rtmrs // null')"
  
            payload="$(jq -cn --arg node_size "$node_size" --arg mrtd "$mrtd" --arg source "ci-auto-approve" \
              '{node_size: $node_size, mrtd: $mrtd, source: $source}')"
            if echo "$rtmrs" | jq -e 'type == "object"' >/dev/null 2>&1; then
              payload="$(echo "$payload" | jq -c --argjson rtmrs "$rtmrs" '. + {rtmrs: $rtmrs}')"
            fi
  
            curl -sfS "${CURL_API_ARGS[@]}" \
              -H "Authorization: Bearer $admin_token" \
              -H "content-type: application/json" \
              -X POST \
              --data "$payload" \
              "$CP_URL/api/admin/trusted-measurements/agent" \
              >/dev/null
            echo "Trusted measurement approved for node_size='${node_size}' mrtd='${mrtd}'"
          }
  
          echo "==> Waiting for $TOTAL_AGENTS agents to register and be verified..."
          for i in $(seq 1 "$AGENT_VERIFY_WAIT_ATTEMPTS"); do
            AGENTS_RAW="$(fetch_agents_raw || echo '{"agents":[]}')"
            AGENTS="$(echo "$AGENTS_RAW" | agents_to_array)"
            VERIFIED=$(echo "$AGENTS" | jq '[.[] | select(.verified == true)] | length')
            TOTAL_SEEN=$(echo "$AGENTS" | jq 'length')
            if [ "$VERIFIED" -ge "$TOTAL_AGENTS" ]; then
              echo "All $TOTAL_AGENTS agents verified"
              break
            elif [ "$VERIFIED" -ge $((TOTAL_AGENTS - 1)) ]; then
              echo "Warning: only $VERIFIED/$TOTAL_AGENTS agents verified"
            fi
            echo "$VERIFIED/$TOTAL_AGENTS agents verified ($TOTAL_SEEN seen), waiting... ($i/$AGENT_VERIFY_WAIT_ATTEMPTS)"
            if [ $((i % 6)) -eq 0 ]; then
              echo "  Agent snapshot:"
              echo "$AGENTS" | jq -r '
                [.[] | {
                  agent_id,
                  vm_name,
                  node_size,
                  status,
                  health_status,
                  verified,
                  datacenter,
                  verification_error
                }]' || true
            fi
            sleep "$AGENT_VERIFY_WAIT_SECONDS"
          done
  
          VERIFIED="$(fetch_agents_raw | agents_to_array | jq '[.[] | select(.verified == true)] | length' 2>/dev/null || echo 0)"
          if [ "$VERIFIED" -lt "$TOTAL_AGENTS" ]; then
            waited_seconds=$((AGENT_VERIFY_WAIT_ATTEMPTS * AGENT_VERIFY_WAIT_SECONDS))
            echo "::error::Not all agents verified after ${waited_seconds}s ($VERIFIED/$TOTAL_AGENTS)"
            echo "::error::Dumping unverified agents (to surface root cause without VM logs)..."
            {
              fetch_agents_raw \
                | agents_to_array \
                | jq -r '
                  .[]
                  | select(.verified != true)
                  | "agent_id=\(.agent_id) vm=\(.vm_name) status=\(.status) health=\(.health_status) size=\(.node_size) dc=\(.datacenter) err=\(.verification_error // \"\")"
                ' 2>/dev/null \
                | head -n 30 \
                | while IFS= read -r line; do
                    [ -n "$line" ] || continue
                    echo "::error::$line"
                  done
            } || true
            if command -v gcloud >/dev/null 2>&1 && [ -n "${GCP_PROJECT_ID:-}" ]; then
              echo ""
              echo "=== Agent VM serial logs (GCP, last 120 lines) ==="
              mapfile -t _agent_vms < <(
                gcloud compute instances list \
                  --project "$GCP_PROJECT_ID" \
                  --filter="labels.easyenclave=managed AND labels.ee_env=${EASYENCLAVE_ENV:-staging}" \
                  --format="value(name,zone)" 2>/dev/null || true
              )
              for vm_zone in "${_agent_vms[@]}"; do
                vm_name="$(echo "$vm_zone" | awk '{print $1}')"
                vm_zone_full="$(echo "$vm_zone" | awk '{print $2}')"
                [ -n "$vm_name" ] || continue
                vm_zone_short="${vm_zone_full##*/}"
                echo "--- ${vm_name} (${vm_zone_short}) ---"
                gcloud compute instances get-serial-port-output "$vm_name" \
                  --project "$GCP_PROJECT_ID" \
                  --zone "$vm_zone_short" \
                  --port 1 2>/dev/null | tail -n 120 || true
              done
            fi
            echo "=== Control plane container logs ==="
            curl -sfS "${CURL_API_ARGS[@]}" "$CP_URL/api/logs/control-plane?limit=50" 2>/dev/null | jq -r '.logs[]?.message' || true
            exit 1
          fi
  
          AGENTS_RAW="$(fetch_agents_raw || echo '{"agents":[]}')"
          AGENTS="$(echo "$AGENTS_RAW" | agents_to_array)"
  
          echo "==> Approving observed trusted measurements..."
          ADMIN_SESSION_TOKEN="$(admin_login)"
          mapfile -t APPROVAL_SIZES < <(
            echo "$AGENTS" \
              | jq -r '[.[] | select(.verified == true) | (.node_size // "") | ascii_downcase | select(. == "tiny" or . == "standard" or . == "llm")] | unique[]'
          )
  
          if [ "${#APPROVAL_SIZES[@]}" -eq 0 ]; then
            echo "::error::No verified node sizes found; cannot auto-approve trusted measurements."
            exit 1
          fi
  
          for node_size in "${APPROVAL_SIZES[@]}"; do
            approve_trusted_measurement_for_size "$ADMIN_SESSION_TOKEN" "$node_size"
          done
  
          curl -sfS "${CURL_API_ARGS[@]}" \
            -H "Authorization: Bearer $ADMIN_SESSION_TOKEN" \
            -X POST \
            "$CP_URL/admin/logout" >/dev/null || true
  
          mkdir -p "$(dirname "$OUTPUT_JSON_PATH")"
          jq -n \
            --arg cp_internal_url "$CP_INTERNAL_URL" \
            --arg cp_public_url "$CP_PUBLIC_URL" \
            --arg cp_bootstrap_url "$CP_BOOTSTRAP_URL" \
            --arg cp_agent_url "$CP_AGENT_URL" \
            --arg cp_name "$CP_NAME" \
            --arg cp_zone "$CP_ZONE" \
            --argjson total_agents "$TOTAL_AGENTS" \
            --argjson verified_agents "$VERIFIED" \
            '{
              cp_internal_url: $cp_internal_url,
              cp_public_url: $cp_public_url,
              cp_bootstrap_url: $cp_bootstrap_url,
              cp_agent_url: $cp_agent_url,
              control_plane_name: $cp_name,
              control_plane_zone: $cp_zone,
              total_agents: $total_agents,
              verified_agents: $verified_agents
            }' > "$OUTPUT_JSON_PATH"
  
          echo "==> Deploy complete! (No measuring-enclave bootstrap; CP measures versions directly.)"
          echo "Wrote deploy output to: $OUTPUT_JSON_PATH"
        executable: /bin/bash
      environment:
        CP_PORT: "{{ cp_port | string }}"
        CP_BOOTSTRAP_TIMEOUT: "{{ cp_bootstrap_timeout | string }}"
        NUM_TINY_AGENTS: "{{ num_tiny_agents | string }}"
        NUM_STANDARD_AGENTS: "{{ num_standard_agents | string }}"
        NUM_LLM_AGENTS: "{{ num_llm_agents | string }}"
        ORCHESTRATION_PROVIDER: "{{ orchestration_provider }}"
        AGENT_DATACENTER: "{{ agent_datacenter }}"
        AGENT_DATACENTER_AZ: "{{ agent_datacenter_az }}"
        AGENT_DATACENTER_REGION: "{{ agent_datacenter_region }}"
        AGENT_VERIFY_WAIT_ATTEMPTS: "{{ agent_verify_wait_attempts | string }}"
        AGENT_VERIFY_WAIT_SECONDS: "{{ agent_verify_wait_seconds | string }}"
        CP_TUNNEL_PORT: "{{ cp_tunnel_port | string }}"
        OUTPUT_JSON_PATH: "{{ output_json_path }}"
