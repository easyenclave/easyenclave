---
- name: Launch GCP VM fleet
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    cp_url: ""
    ita_api_key: ""
    num_tiny: 0
    num_standard: 0
    num_llm: 0
    vm_wait: true
    vm_timeout_seconds: 600
    agent_zone: ""
    agent_region: ""
    agent_datacenter: ""
    output_json_path: /tmp/ee-gcp-vm-fleet.json
  tasks:
    - name: Validate required vars
      ansible.builtin.assert:
        that:
          - lookup('env', 'GCP_PROJECT_ID') | length > 0
          - cp_url | length > 0
          - ita_api_key | length > 0
        fail_msg: "GCP_PROJECT_ID, cp_url and ita_api_key are required"

    - name: Build launch-size list
      ansible.builtin.set_fact:
        launch_sizes: "{{ (['tiny'] * (num_tiny | int)) + (['standard'] * (num_standard | int)) + (['llm'] * (num_llm | int)) }}"

    - name: Launch VM for each requested size
      ansible.builtin.shell: |
        set -euo pipefail

        fail() {
          echo "::error::$*"
          exit 1
        }

        normalize_name() {
          local input="$1" max_len="${2:-63}" cleaned
          cleaned="$(printf '%s' "$input" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//')"
          [ -n "$cleaned" ] || cleaned="easyenclave"
          cleaned="${cleaned:0:${max_len}}"
          cleaned="$(printf '%s' "$cleaned" | sed -E 's/-+$//')"
          [ -n "$cleaned" ] || cleaned="easyenclave"
          printf '%s' "$cleaned"
        }

        random_suffix() {
          cat /proc/sys/kernel/random/uuid | tr -d '-' | cut -c1-"${1:-8}"
        }

        machine_type_for_size() {
          case "$1" in
            tiny) echo "c3-standard-4" ;;
            standard) echo "c3-standard-8" ;;
            llm) echo "c3-standard-22" ;;
            *) fail "Unsupported size '$1'" ;;
          esac
        }

        disk_gib_for_size() {
          case "$1" in
            tiny) echo "80" ;;
            standard) echo "100" ;;
            llm) echo "140" ;;
            *) fail "Unsupported size '$1'" ;;
          esac
        }

        image_selector_args() {
          local image_project image_name image_family
          image_project="${EE_GCP_IMAGE_PROJECT:-$GCP_PROJECT_ID}"
          image_name="${EE_GCP_IMAGE_NAME:-}"
          image_family="${EE_GCP_IMAGE_FAMILY:-easyenclave-agent-main}"
          if [ -n "$image_name" ]; then
            printf -- '--image-project\n%s\n--image\n%s\n' "$image_project" "$image_name"
          else
            printf -- '--image-project\n%s\n--image-family\n%s\n' "$image_project" "$image_family"
          fi
        }

        write_agent_startup_script() {
          local cfg_json="$1" script_path="$2"
          cat > "$script_path" <<SCRIPT
        #!/usr/bin/env bash
        set -euo pipefail
        mkdir -p /etc/easyenclave
        cat > /etc/easyenclave/agent.json <<'EOF_CONFIG'
        ${cfg_json}
        EOF_CONFIG
        chmod 0600 /etc/easyenclave/agent.json
        systemctl daemon-reload || true
        systemctl disable --now easyenclave-control-plane.service || true
        systemctl enable easyenclave-agent.service || true
        systemctl restart easyenclave-agent.service || true
        SCRIPT
          chmod +x "$script_path"
        }

        [ -n "${GCP_PROJECT_ID:-}" ] || fail "Missing GCP_PROJECT_ID"
        [ -n "${SIZE:-}" ] || fail "Missing SIZE"

        size="$(printf '%s' "$SIZE" | tr '[:upper:]' '[:lower:]')"
        machine_type="$(machine_type_for_size "$size")"
        disk_gib="$(disk_gib_for_size "$size")"
        zone="${AGENT_ZONE:-${GCP_ZONE:-us-central1-a}}"
        env_name="${EASYENCLAVE_ENV:-staging}"
        network_name="${EASYENCLAVE_NETWORK_NAME:-}"
        vm_name="$(normalize_name "tdx-agent-$(random_suffix 10)" 63)"
        datacenter_label="${AGENT_DATACENTER:-gcp:${zone}}"
        region="${AGENT_REGION:-}"

        cfg_json="$(jq -n \
          --arg cp_url "$CP_URL" \
          --arg zone "$zone" \
          --arg region "$region" \
          --arg datacenter "$datacenter_label" \
          --arg size "$size" \
          --arg ita "$ITA_API_KEY" \
          --arg env_name "$env_name" \
          --arg network_name "$network_name" \
          '{
            control_plane_url: $cp_url,
            cloud_provider: "gcp",
            availability_zone: $zone,
            region: $region,
            datacenter: $datacenter,
            node_size: $size,
            intel_api_key: $ita,
            ita_api_key: $ita,
            easyenclave_env: $env_name,
            easyenclave_network_name: $network_name
          } | with_entries(select(.value != "" and .value != null))')"

        startup_script="$(mktemp -t ee-agent-startup.XXXXXX.sh)"
        write_agent_startup_script "$cfg_json" "$startup_script"

        labels="easyenclave=managed,ee_role=agent,ee_env=$(normalize_name "$env_name" 63),ee_network=$(normalize_name "${network_name:-default}" 63),ee_node_size=$(normalize_name "$size" 63)"
        mapfile -t source_args < <(image_selector_args)

        gcloud compute instances create "$vm_name" \
          --project "$GCP_PROJECT_ID" \
          --zone "$zone" \
          --machine-type "$machine_type" \
          --boot-disk-size "${disk_gib}GB" \
          --boot-disk-type "pd-balanced" \
          --maintenance-policy TERMINATE \
          --provisioning-model STANDARD \
          --confidential-compute-type TDX \
          --labels "$labels" \
          --metadata "serial-port-enable=1,enable-oslogin=FALSE" \
          --metadata-from-file "startup-script=${startup_script}" \
          --scopes "https://www.googleapis.com/auth/cloud-platform" \
          "${source_args[@]}" >/dev/null

        rm -f "$startup_script" || true

        if [ "${VM_WAIT:-true}" = "true" ]; then
          deadline=$(( $(date +%s) + VM_TIMEOUT_SECONDS ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            status="$(gcloud compute instances describe "$vm_name" --project "$GCP_PROJECT_ID" --zone "$zone" --format='value(status)' || true)"
            if [ "${status^^}" = "RUNNING" ]; then
              break
            fi
            sleep 3
          done
        fi

        inst_json="$(gcloud compute instances describe "$vm_name" --project "$GCP_PROJECT_ID" --zone "$zone" --format=json)"
        internal_ip="$(echo "$inst_json" | jq -r '.networkInterfaces[0].networkIP // ""')"
        external_ip="$(echo "$inst_json" | jq -r '.networkInterfaces[0].accessConfigs[0].natIP // ""')"

        jq -n \
          --arg name "$vm_name" \
          --arg zone "$zone" \
          --arg internal_ip "$internal_ip" \
          --arg external_ip "$external_ip" \
          --arg datacenter "$datacenter_label" \
          --arg size "$size" \
          '{
            name: $name,
            zone: $zone,
            internal_ip: ($internal_ip // ""),
            external_ip: ($external_ip // ""),
            cloud_provider: "gcp",
            datacenter: $datacenter,
            node_size: $size
          }'
      args:
        executable: /bin/bash
      environment:
        SIZE: "{{ item }}"
        CP_URL: "{{ cp_url }}"
        ITA_API_KEY: "{{ ita_api_key }}"
        VM_WAIT: "{{ vm_wait | bool | ternary('true', 'false') }}"
        VM_TIMEOUT_SECONDS: "{{ vm_timeout_seconds | string }}"
        AGENT_ZONE: "{{ agent_zone }}"
        AGENT_REGION: "{{ agent_region }}"
        AGENT_DATACENTER: "{{ agent_datacenter }}"
      loop: "{{ launch_sizes }}"
      register: vm_create_results
      when: launch_sizes | length > 0

    - name: Collect launched VM JSON records
      ansible.builtin.set_fact:
        launched_vms: "{{ (vm_create_results.results | default([])) | map(attribute='stdout') | map('from_json') | list }}"

    - name: Write launched VM JSON output file
      ansible.builtin.copy:
        dest: "{{ output_json_path }}"
        content: "{{ launched_vms | default([]) | to_nice_json }}\n"
        mode: "0600"
