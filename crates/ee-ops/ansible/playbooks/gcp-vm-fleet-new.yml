---
- name: Launch GCP VM fleet
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    cp_url: ""
    ita_api_key: ""
    num_tiny: 0
    num_standard: 0
    num_llm: 0
    vm_wait: true
    vm_timeout_seconds: 600
    agent_zone: ""
    agent_region: ""
    agent_datacenter: ""
    output_json_path: /tmp/ee-gcp-vm-fleet.json
  tasks:
    - name: Validate required vars
      ansible.builtin.assert:
        that:
          - cp_url | length > 0
          - ita_api_key | length > 0
        fail_msg: "cp_url and ita_api_key are required"

    - name: Build launch-size list
      ansible.builtin.set_fact:
        launch_sizes: "{{ (['tiny'] * (num_tiny | int)) + (['standard'] * (num_standard | int)) + (['llm'] * (num_llm | int)) }}"

    - name: Start VMs asynchronously
      ansible.builtin.shell: |
        set -euo pipefail
        args=(vm new --size "{{ item }}" --cp-url "{{ cp_url }}" --ita-api-key "{{ ita_api_key }}" --timeout "{{ vm_timeout_seconds | int }}")
        if [ "{{ vm_wait | bool | ternary('true','false') }}" = "true" ]; then
          args+=(--wait)
        fi
        if [ -n "{{ agent_zone }}" ]; then
          args+=(--zone "{{ agent_zone }}")
        fi
        if [ -n "{{ agent_region }}" ]; then
          args+=(--region "{{ agent_region }}")
        fi
        if [ -n "{{ agent_datacenter }}" ]; then
          args+=(--datacenter "{{ agent_datacenter }}")
        fi
        bash crates/ee-ops/assets/gcp-nodectl.sh "${args[@]}"
      args:
        executable: /bin/bash
      async: "{{ (vm_timeout_seconds | int) + 300 }}"
      poll: 0
      loop: "{{ launch_sizes }}"
      register: vm_jobs
      when: launch_sizes | length > 0

    - name: Wait for VM launch completion
      ansible.builtin.async_status:
        jid: "{{ item.ansible_job_id }}"
      register: vm_job_status
      until: vm_job_status.finished
      retries: "{{ (((vm_timeout_seconds | int) + 300) // 5) | int }}"
      delay: 5
      loop: "{{ vm_jobs.results | default([]) }}"
      when: launch_sizes | length > 0

    - name: Collect launched VM JSON records
      ansible.builtin.set_fact:
        launched_vms: "{{ (vm_job_status.results | default([])) | map(attribute='stdout') | map('from_json') | list }}"

    - name: Write launched VM JSON output file
      ansible.builtin.copy:
        dest: "{{ output_json_path }}"
        content: "{{ launched_vms | default([]) | to_nice_json }}\n"
        mode: "0600"
